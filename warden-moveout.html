<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GMI HostelKu - Move-Out Requests</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Poppins', sans-serif; display: flex; flex-direction: column; height: 100vh; background: #f0f3fa; overflow: hidden; }
        
        /* Header Styling */
        header { background: linear-gradient(135deg, #1e3a8a 0%, #2d72d2 100%); backdrop-filter: blur(10px); color: white; padding: 0 25px; display: flex; align-items: center; justify-content: space-between; z-index: 1000; flex-shrink: 0; height: 70px; box-shadow: 0 2px 20px rgba(0,0,0,0.1); }

        
        
        
        

        
        .brand-container { 
            display: flex; 
            align-items: center; 
            font-size: 24px; 
            font-weight: 800; 
            cursor: pointer; 
            position: relative; 
            margin-left: 10px;
            letter-spacing: -0.5px;
        }
        
        
        
        
        .menu-toggle { cursor: pointer; font-size: 22px; color: white; margin-right: 15px; transition: transform 0.3s; }
        .menu-toggle:hover { transform: scale(1.1); }

        /* Avatar in Header */
                /* Premium Warden Avatar */
                /* Premium Warden Avatar */
        .avatar-container {
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            align-items: center;
            justify-content: center;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: linear-gradient(135deg, #ff3131 0%, #cc0000 100%);
            border: 2px solid rgba(255, 255, 255, 0.9);
            position: relative;
            overflow: hidden;
        }
        .avatar-container::after {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.4) 0%, transparent 60%);
        }
        .avatar-container:hover {
            transform: scale(1.1) translateY(-2px);
            border-color: #ffffff;
        }
        .avatar-container i {
            font-size: 22px;
            color: #ffffff;
            z-index: 2;
        }

        .container { display: flex; flex: 1; overflow: hidden; position: relative; }
        
        /* Sidebar */
        nav { width: 280px; background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); border-right: 1px solid rgba(255,255,255,0.2); padding: 25px 0; display: flex; flex-direction: column; transition: transform 0.3s ease; z-index: 900; overflow-y: auto; box-shadow: 5px 0 25px rgba(0,0,0,0.1); }

        .nav-menu { padding: 0 20px; flex: 1; }
        .nav-item { display: flex; align-items: center; padding: 14px 20px; margin-bottom: 8px; text-decoration: none; color: #333; border-radius: 12px; font-size: 15px; font-weight: 500; transition: all 0.3s; }
        .nav-item:hover { background: linear-gradient(135deg, #1e3a8a 0%, #2d72d2 100%); color: white; transform: translateX(5px); box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4); }
        .nav-item.active { background: linear-gradient(135deg, #1e3a8a 0%, #2d72d2 100%); color: white; box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4); }
        .nav-item i { margin-right: 12px; font-size: 20px; width: 24px; text-align: center; }
        
        .logout-btn { margin: 20px 20px 15px 20px; color: #f44336; border: 2px solid #f44336; background: transparent; }
        .logout-btn:hover { background: #f44336; color: white; border-color: #f44336; transform: translateX(5px); }
        
        main { flex: 1; padding: 30px; overflow-y: auto; background: #f0f3fa; }

        /* Loading Spinner */
        .loading-spinner {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 50px;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid rgba(102, 126, 234, 0.2);
            border-radius: 50%;
            border-top-color: #2d72d2;
            animation: spin 1s ease-in-out infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Refresh Button */
        .refresh-btn {
            background: #2d72d2;
            color: white;
            border: none;
            border-radius: 8px;
            padding: 10px 20px;
            font-size: 14px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.3s;
        }

        .refresh-btn:hover {
            background: #764ba2;
            transform: translateY(-2px);
        }

        /* Page Header */
        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(10px);
            padding: 20px 25px;
            border-radius: 15px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
        }

        .page-header h2 {
            font-size: 24px;
            color: #0f1638;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .page-header h2 i {
            color: #2d72d2;
        }

        .stats-badge {
            display: flex;
            gap: 15px;
        }

        .stat-badge-item {
            background: linear-gradient(135deg, #1e3a8a 0%, #2d72d2 100%);
            color: white;
            padding: 8px 15px;
            border-radius: 50px;
            font-size: 13px;
            font-weight: 500;
        }

        /* Status Tabs */
        .status-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 25px;
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(10px);
            padding: 10px;
            border-radius: 12px;
        }

        .tab-btn {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 8px;
            background: transparent;
            color: #666;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .tab-btn i { font-size: 16px; }
        .tab-btn.active {
            background: linear-gradient(135deg, #1e3a8a 0%, #2d72d2 100%);
            color: white;
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.3);
        }

        /* Filters */
        .filters-section {
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(10px);
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 25px;
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            align-items: center;
        }

        .search-box {
            flex: 1;
            min-width: 250px;
            position: relative;
        }

        .search-box i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #999;
        }

        .search-box input {
            width: 100%;
            padding: 12px 15px 12px 45px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-family: 'Poppins', sans-serif;
            font-size: 14px;
            transition: all 0.3s;
        }

        .search-box input:focus {
            border-color: #2d72d2;
            outline: none;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .filter-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .filter-select {
            padding: 10px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-family: 'Poppins', sans-serif;
            font-size: 14px;
            background: white;
            cursor: pointer;
            min-width: 140px;
        }

        .filter-select:focus {
            border-color: #2d72d2;
            outline: none;
        }

        /* Move-Out Cards Grid */
        .moveout-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(400px, 1fr));
            gap: 20px;
            margin-bottom: 25px;
        }

        .moveout-card {
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            transition: all 0.3s;
        }

        .moveout-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 1px solid #eee;
        }

        .student-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .student-avatar {
            width: 50px;
            height: 50px;
            border-radius: 12px;
            background: linear-gradient(135deg, #1e3a8a 0%, #2d72d2 100%);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 18px;
        }

        .student-details h4 {
            font-size: 16px;
            font-weight: 600;
            color: #0f1638;
            margin-bottom: 4px;
        }

        .student-details p {
            font-size: 13px;
            color: #666;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .status-badge {
            padding: 5px 12px;
            border-radius: 50px;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
        }

        .status-pending { background: #fff3e0; color: #ff9800; }
        .status-scheduled { background: #e3f2fd; color: #2196f3; }
        .status-inspected { background: #e8f5e9; color: #4caf50; }
        .status-completed { background: #e8eaf6; color: #3f51b5; }

        .info-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 20px;
        }

        .info-item {
            background: rgba(0,0,0,0.02);
            padding: 10px;
            border-radius: 8px;
        }

        .info-label {
            font-size: 11px;
            color: #999;
            text-transform: uppercase;
            margin-bottom: 5px;
        }

        .info-value {
            font-size: 14px;
            font-weight: 600;
            color: #0f1638;
        }

        .info-value i {
            color: #2d72d2;
            margin-right: 5px;
            font-size: 12px;
        }

        .inspection-checklist {
            background: rgba(102, 126, 234, 0.05);
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 20px;
        }

        .checklist-title {
            font-size: 13px;
            font-weight: 600;
            color: #0f1638;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .checklist-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 0;
            border-bottom: 1px solid rgba(0,0,0,0.05);
        }

        .checklist-item:last-child {
            border-bottom: none;
        }

        .checklist-item input[type="checkbox"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
            accent-color: #2d72d2;
        }

        .checklist-item label {
            flex: 1;
            font-size: 13px;
            color: #333;
            cursor: pointer;
        }

        .checklist-status {
            font-size: 11px;
            padding: 3px 8px;
            border-radius: 20px;
        }

        .status-good { background: #e8f5e9; color: #4caf50; }
        .status-damaged { background: #ffebee; color: #f44336; }

        .damage-notes {
            margin-top: 10px;
            padding: 10px;
            background: white;
            border-radius: 8px;
            font-size: 12px;
            color: #666;
            border-left: 3px solid #2d72d2;
        }

        .card-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 20px;
            padding-top: 15px;
            border-top: 1px solid #eee;
        }

        .action-buttons {
            display: flex;
            gap: 8px;
        }

        .action-btn {
            padding: 8px 15px;
            border-radius: 8px;
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;
            border: none;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .action-schedule { background: #e3f2fd; color: #2196f3; }
        .action-inspect { background: #fff3e0; color: #ff9800; }
        .action-approve { background: #e8f5e9; color: #4caf50; }
        .action-view { background: #e8eaf6; color: #3f51b5; }
        .action-btn:hover { transform: translateY(-2px); box-shadow: 0 3px 8px rgba(0,0,0,0.2); }

        .deposit-info {
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 13px;
            font-weight: 600;
        }

        .deposit-pending { color: #ff9800; }
        .deposit-returned { color: #4caf50; }
        .deposit-deducted { color: #f44336; }

        /* Pagination */
        .pagination {
            display: flex;
            justify-content: flex-end;
            gap: 5px;
            margin-top: 20px;
        }

        .page-btn {
            width: 35px;
            height: 35px;
            border-radius: 8px;
            border: 1px solid #e0e0e0;
            background: white;
            cursor: pointer;
            transition: all 0.3s;
        }

        .page-btn.active {
            background: #2d72d2;
            color: white;
            border-color: #2d72d2;
        }

        .page-btn:hover:not(.active) {
            background: #f5f5f5;
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 50px;
            color: #999;
        }

        .empty-state i {
            font-size: 60px;
            margin-bottom: 20px;
            color: #2d72d2;
        }

        @media (max-width: 768px) {
            .page-header { flex-direction: column; align-items: flex-start; gap: 15px; }
            nav { position: absolute; left: 0; top: 0; bottom: 0; transform: translateX(-100%); width: 280px; }
            nav.open { transform: translateX(0); }
            .menu-overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); z-index: 800; backdrop-filter: blur(3px); }
            .menu-overlay.active { display: block; }
            .filters-section { flex-direction: column; }
            .filter-group { width: 100%; }
            .filter-select { width: 100%; }
            .stats-badge { flex-direction: row; flex-wrap: wrap; justify-content: center; gap: 8px; width: 100%; }
            .stat-badge-item { flex: 1 1 auto; justify-content: center; text-align: center; }
            .status-tabs { flex-direction: column; }
            .moveout-grid { grid-template-columns: 1fr; }
            .info-grid { grid-template-columns: 1fr; }
            .card-footer { flex-direction: column; gap: 10px; }
            .action-buttons { width: 100%; justify-content: stretch; }
            .action-btn { flex: 1; justify-content: center; }
        }
    </style>

    <style id="unified-logo-style">
        .gmi-wrapper {
            position: relative;
            display: inline-block;
            line-height: 1;
            padding-right: 0.05em; /* Padding for the wrapper */
        }
        .brand-blue {
            color: #1118a8; /* Deep blue from image */
            font-weight: 900;
            font-family: 'Arial', sans-serif;
            letter-spacing: -1px;
            text-shadow: 
                -0.8px -0.8px 0 #fff, 0px -0.8px 0 #fff, 0.8px -0.8px 0 #fff, 0.8px 0px 0 #fff, 0.8px 0.8px 0 #fff, 0px 0.8px 0 #fff, -0.8px 0.8px 0 #fff, -0.8px 0px 0 #fff, 0 4px 6px rgba(0,0,0,0.3);
        }
        .brand-dot {
            position: absolute;
            top: -0.24em;
            right: 0.05em;
            /* Shifted to perfectly align over the I */

            /* Red dot from image */
            border-radius: 50%;
            box-shadow: 0 0 0 0.8px #fff, 0 4px 6px rgba(0, 0, 0, 0.3);
        }
        .brand-lime {
            color: #ccff00;
            margin-left: 5px;
            font-family: 'Poppins', sans-serif;
            font-weight: 800;
            text-shadow: 
                -0.8px -0.8px 0 #000, 0px -0.8px 0 #000, 0.8px -0.8px 0 #000, 0.8px 0px 0 #000, 0.8px 0.8px 0 #000, 0px 0.8px 0 #000, -0.8px 0.8px 0 #000, -0.8px 0px 0 #000, 0 4px 6px rgba(0,0,0,0.3);
        }
        /* Increased font size for dashboards */
        .brand-container {
            font-size: 32px !important;
        }
    </style>

    
</head>
<body>
    <header>
        <div style="display: flex; align-items: center;">
            <i class="fas fa-bars menu-toggle" id="hamburger"></i>
            <div class="brand-container" onclick="window.location.href='warden-dashboard.html'">
            <span class="gmi-wrapper"><span class="brand-blue">GMI</span><span class="brand-dot"></span></span><span class="brand-lime">HostelKu.</span>
        </div>
        </div>
        <div style="display: flex; align-items: center; gap: 10px;">
            <a href="warden-profile.html" class="avatar-container" id="profileLink">
                <i class="fas fa-user-shield"></i>
            </a>
        </div>
    </header>

    <div class="menu-overlay" id="menuOverlay"></div>

    <div class="container">
        <nav id="sidebar">
            <div class="nav-menu">
                <a href="warden-profile.html" class="nav-item"><i class="fas fa-user"></i> My Profile</a>
                <a href="warden-dashboard.html" class="nav-item"><i class="fas fa-home"></i> Dashboard</a>
                <a href="warden-applications.html" class="nav-item"><i class="fas fa-file-alt"></i> Applications</a>
                <a href="warden-moveout.html" class="nav-item active"><i class="fas fa-box-open"></i> Move-Out</a>
                <a href="warden-maintenance.html" class="nav-item"><i class="fas fa-tools"></i> Maintenance</a>
                <a href="warden-students.html" class="nav-item"><i class="fas fa-users"></i> Students</a>
                <a href="warden-rooms.html" class="nav-item"><i class="fas fa-bed"></i> Rooms</a>
                <a href="warden-reports.html" class="nav-item"><i class="fas fa-chart-bar"></i> Reports</a>
            </div>
            <a href="#" class="nav-item logout-btn" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> Logout</a>
        </nav>

        <main id="mainContent">
            <div class="page-header">
                <h2>
                    <i class="fas fa-box-open"></i>
                    Move-Out Requests
                </h2>
                <div class="stats-badge" id="stats-badge">
                    <span class="stat-badge-item"><i class="fas fa-clock"></i> Pending: <span id="pendingCount">0</span></span>
                    <span class="stat-badge-item"><i class="fas fa-calendar-check"></i> Scheduled: <span id="scheduledCount">0</span></span>
                    <span class="stat-badge-item"><i class="fas fa-check-circle"></i> Completed: <span id="completedCount">0</span></span>
                </div>
            </div>

            <!-- Status Tabs -->
            <div class="status-tabs">
                <button class="tab-btn active" onclick="filterStatus('all')">
                    <i class="fas fa-list"></i> All Requests
                </button>
                <button class="tab-btn" onclick="filterStatus('pending')">
                    <i class="fas fa-clock"></i> Pending
                </button>
                <button class="tab-btn" onclick="filterStatus('scheduled')">
                    <i class="fas fa-calendar-check"></i> Scheduled
                </button>
                <button class="tab-btn" onclick="filterStatus('inspected')">
                    <i class="fas fa-clipboard-check"></i> Inspected
                </button>
                <button class="tab-btn" onclick="filterStatus('completed')">
                    <i class="fas fa-check-double"></i> Completed
                </button>
            </div>

            <!-- Filters -->
            <div class="filters-section">
                <div class="search-box">
                    <i class="fas fa-search"></i>
                    <input type="text" id="searchInput" placeholder="Search by name, ID, or room...">
                </div>
                <div class="filter-group">
                    <select class="filter-select" id="dateFilter">
                        <option value="all">All Move-Out Dates</option>
                        <option value="today">Today</option>
                        <option value="week">This Week</option>
                        <option value="month">This Month</option>
                        <option value="next">Next Month</option>
                    </select>
                    <select class="filter-select" id="blockFilter">
                        <option value="all">All Blocks</option>
                        <option value="A">Block A</option>
                        <option value="B">Block B</option>
                        <option value="C">Block C</option>
                    </select>
                    <button class="refresh-btn" id="refreshBtn">
                        <i class="fas fa-sync-alt"></i> Refresh
                    </button>
                </div>
            </div>

            <!-- Move-Out Cards Grid -->
            <div class="moveout-grid" id="moveoutGrid">
                <!-- Cards will be populated dynamically by JavaScript -->
            </div>

            <!-- Pagination -->
            <div class="pagination" id="pagination">
                <button class="page-btn" id="prevPage"><i class="fas fa-chevron-left"></i></button>
                <span id="pageNumbers"></span>
                <button class="page-btn" id="nextPage"><i class="fas fa-chevron-right"></i></button>
            </div>
        </main>
    </div>

    <script type="module">
        import { getAuth, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, collection, query, where, orderBy, getDocs, doc, updateDoc, deleteDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        import { auth, db } from "./js/firebase-config.js";

        const hamburger = document.getElementById('hamburger');
        const sidebar = document.getElementById('sidebar');
        const mainContent = document.getElementById('mainContent');
        const menuOverlay = document.getElementById('menuOverlay');
        const moveoutGrid = document.getElementById('moveoutGrid');
        const searchInput = document.getElementById('searchInput');
        const dateFilter = document.getElementById('dateFilter');
        const blockFilter = document.getElementById('blockFilter');
        const refreshBtn = document.getElementById('refreshBtn');
        const pendingCount = document.getElementById('pendingCount');
        const scheduledCount = document.getElementById('scheduledCount');
        const completedCount = document.getElementById('completedCount');

        let allRequests = [];
        let filteredRequests = [];
        let currentStatus = 'all';
        let currentPage = 1;
        const itemsPerPage = 6;

        function closeSidebar() { sidebar.classList.remove('open'); menuOverlay.classList.remove('active'); }
        function openSidebar() { sidebar.classList.add('open'); menuOverlay.classList.add('active'); }

        hamburger.addEventListener('click', (e) => {
            e.preventDefault();
            sidebar.classList.contains('open') ? closeSidebar() : openSidebar();
        });

        menuOverlay.addEventListener('click', closeSidebar);
        mainContent.addEventListener('click', () => { if (window.innerWidth <= 768 && sidebar.classList.contains('open')) closeSidebar(); });
        window.addEventListener('resize', () => { if (window.innerWidth > 768) closeSidebar(); });

        onAuthStateChanged(auth, (user) => {
            if (user) {
                const email = user.email ? user.email.toLowerCase() : '';
                const isStudent = email.endsWith('@student.gmi.edu.my');
                
                if (isStudent) {
                    alert('🛡️ Access Denied: Student accounts cannot access Warden pages.');
                    window.location.href = 'student-dashboard.html';
                    return;
                }
                // RBAC PASS
            }
            if (user) {
                if (!user.email.endsWith('@gmi.edu.my') || user.email.includes('@student.')) {
                    alert("Access Denied: This portal is for wardens only.");
                    signOut(auth).then(() => window.location.href = "warden-login.html");
                    return;
                }
                // Load move-out requests
                loadMoveOutRequests();
                setupRealtimeListener();
            } else { window.location.href = "warden-login.html"; }
        });

        document.getElementById('logoutBtn').addEventListener('click', (e) => {
            e.preventDefault();
            signOut(auth).then(() => window.location.href = "index.html");
        });

        // Setup real-time listener
        function setupRealtimeListener() {
            const q = query(collection(db, "moveout_requests"), orderBy("submittedAt", "desc"));
            
            onSnapshot(q, (snapshot) => {
                allRequests = [];
                snapshot.forEach((doc) => {
                    allRequests.push({
                        id: doc.id,
                        ...doc.data()
                    });
                });
                updateStats();
                filterAndRenderRequests();
            }, (error) => {
                console.error("Error listening to requests:", error);
            });
        }

        // Load move-out requests
        async function loadMoveOutRequests() {
            try {
                moveoutGrid.innerHTML = '<div class="loading-spinner"><div class="spinner"></div></div>';
                
                const q = query(collection(db, "moveout_requests"), orderBy("submittedAt", "desc"));
                const querySnapshot = await getDocs(q);
                
                allRequests = [];
                querySnapshot.forEach((doc) => {
                    allRequests.push({
                        id: doc.id,
                        ...doc.data()
                    });
                });
                
                updateStats();
                filterAndRenderRequests();
                
            } catch (error) {
                console.error("Error loading move-out requests:", error);
                moveoutGrid.innerHTML = '<div class="empty-state"><i class="fas fa-exclamation-circle"></i><h3>Error Loading Data</h3><p>' + error.message + '</p></div>';
            }
        }

        // Update statistics
        function updateStats() {
            const pending = allRequests.filter(req => req.status === 'pending').length;
            const scheduled = allRequests.filter(req => req.status === 'scheduled').length;
            const inspected = allRequests.filter(req => req.status === 'inspected').length;
            const completed = allRequests.filter(req => req.status === 'completed').length;
            
            pendingCount.textContent = pending;
            scheduledCount.textContent = scheduled + inspected;
            completedCount.textContent = completed;
        }

        // Filter and render requests
        function filterAndRenderRequests() {
            const searchTerm = searchInput.value.toLowerCase();
            const dateFilterValue = dateFilter.value;
            const blockFilterValue = blockFilter.value;
            
            filteredRequests = allRequests.filter(req => {
                // Status filter
                if (currentStatus !== 'all' && req.status !== currentStatus) {
                    return false;
                }
                
                // Search filter
                if (searchTerm) {
                    const matchesName = req.fullName?.toLowerCase().includes(searchTerm) || false;
                    const matchesId = req.indexNumber?.toLowerCase().includes(searchTerm) || false;
                    const matchesUnit = req.unitNo?.toLowerCase().includes(searchTerm) || false;
                    if (!matchesName && !matchesId && !matchesUnit) {
                        return false;
                    }
                }
                
                // Block filter
                if (blockFilterValue !== 'all') {
                    const block = req.unitNo?.charAt(0) || '';
                    if (block !== blockFilterValue) {
                        return false;
                    }
                }
                
                // Date filter (simplified)
                if (dateFilterValue !== 'all' && req.moveOutDate) {
                    const moveOutDate = new Date(req.moveOutDate);
                    const today = new Date();
                    
                    if (dateFilterValue === 'today') {
                        if (moveOutDate.toDateString() !== today.toDateString()) return false;
                    } else if (dateFilterValue === 'week') {
                        const weekLater = new Date(today);
                        weekLater.setDate(today.getDate() + 7);
                        if (moveOutDate < today || moveOutDate > weekLater) return false;
                    } else if (dateFilterValue === 'month') {
                        if (moveOutDate.getMonth() !== today.getMonth() || moveOutDate.getFullYear() !== today.getFullYear()) return false;
                    }
                }
                
                return true;
            });
            
            renderRequests();
        }

        // Render requests to grid
        function renderRequests() {
            if (filteredRequests.length === 0) {
                moveoutGrid.innerHTML = '<div class="empty-state"><i class="fas fa-box-open"></i><h3>No Move-Out Requests Found</h3><p>There are no move-out requests to display.</p></div>';
                return;
            }
            
            const start = (currentPage - 1) * itemsPerPage;
            const end = start + itemsPerPage;
            const pageItems = filteredRequests.slice(start, end);
            
            let html = '';
            pageItems.forEach(req => {
                const submittedDate = req.submittedAt?.toDate ? 
                    req.submittedAt.toDate().toLocaleDateString('en-MY') : 
                    new Date().toLocaleDateString('en-MY');
                
                const moveOutDate = req.moveOutDate ? 
                    new Date(req.moveOutDate).toLocaleDateString('en-MY', { day: 'numeric', month: 'short', year: 'numeric' }) : 
                    'Not specified';
                
                const initials = req.fullName ? req.fullName.split(' ').map(n => n[0]).join('').toUpperCase().substring(0, 2) : '?';
                
                html += `
                    <div class="moveout-card" data-status="${req.status || 'pending'}">
                        <div class="card-header">
                            <div class="student-info">
                                <div class="student-avatar">${initials}</div>
                                <div class="student-details">
                                    <h4>${req.fullName || 'N/A'}</h4>
                                    <p><i class="fas fa-id-card"></i> ${req.indexNumber || 'N/A'} • Room ${req.unitNo || 'N/A'}</p>
                                </div>
                            </div>
                            <span class="status-badge status-${req.status || 'pending'}">${(req.status || 'pending').toUpperCase()}</span>
                        </div>

                        <div class="info-grid">
                            <div class="info-item">
                                <div class="info-label">Move-Out Date</div>
                                <div class="info-value"><i class="fas fa-calendar-alt"></i> ${moveOutDate}</div>
                            </div>
                            <div class="info-item">
                                <div class="info-label">Applied On</div>
                                <div class="info-value"><i class="fas fa-clock"></i> ${submittedDate}</div>
                            </div>
                            <div class="info-item">
                                <div class="info-label">Reason</div>
                                <div class="info-value">${req.reason || 'Not specified'}</div>
                            </div>
                            <div class="info-item">
                                <div class="info-label">Contact</div>
                                <div class="info-value"><i class="fas fa-phone"></i> ${req.contactNo || 'N/A'}</div>
                            </div>
                        </div>

                        <div class="card-footer">
                            <div class="action-buttons">
                                <button class="action-btn action-view" onclick="viewRequest('${req.id}')">
                                    <i class="fas fa-eye"></i> View
                                </button>
                                ${req.status === 'pending' ? `
                                    <button class="action-btn action-schedule" onclick="updateRequestStatus('${req.id}', 'scheduled')">
                                        <i class="fas fa-calendar-plus"></i> Schedule
                                    </button>
                                ` : ''}
                                ${req.status === 'scheduled' ? `
                                    <button class="action-btn action-inspect" onclick="updateRequestStatus('${req.id}', 'inspected')">
                                        <i class="fas fa-clipboard-check"></i> Inspect
                                    </button>
                                ` : ''}
                                ${req.status === 'inspected' ? `
                                    <button class="action-btn action-approve" onclick="updateRequestStatus('${req.id}', 'completed')">
                                        <i class="fas fa-check-double"></i> Complete
                                    </button>
                                ` : ''}
                            </div>
                        </div>
                    </div>
                `;
            });
            
            moveoutGrid.innerHTML = html;
            renderPagination();
        }

        // Render pagination
        function renderPagination() {
            const totalPages = Math.ceil(filteredRequests.length / itemsPerPage);
            const pageNumbers = document.getElementById('pageNumbers');
            
            let pagesHtml = '';
            for (let i = 1; i <= totalPages; i++) {
                pagesHtml += `<button class="page-btn ${i === currentPage ? 'active' : ''}" onclick="goToPage(${i})">${i}</button>`;
            }
            
            pageNumbers.innerHTML = pagesHtml;
        }

        // Global functions
        window.filterStatus = (status) => {
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            currentStatus = status;
            currentPage = 1;
            filterAndRenderRequests();
        };

        window.viewRequest = (id) => {
            const req = allRequests.find(r => r.id === id);
            alert(`📋 Move-Out Request Details:\n\n` +
                  `Name: ${req.fullName}\n` +
                  `Index No: ${req.indexNumber}\n` +
                  `Course: ${req.course}\n` +
                  `Semester: ${req.semester}\n` +
                  `Unit: ${req.unitNo}\n` +
                  `Contact: ${req.contactNo}\n` +
                  `Reason: ${req.reason}\n` +
                  `Move-Out Date: ${req.moveOutDate}\n` +
                  `Inspection Time: ${req.inspectionTime || 'Not specified'}\n` +
                  `Address: ${req.correspondenceAddress}`);
        };

        window.updateRequestStatus = async (id, status) => {
            if (confirm(`Are you sure you want to mark this request as ${status}?`)) {
                try {
                    await updateDoc(doc(db, "moveout_requests", id), {
                        status: status,
                        updatedAt: new Date()
                    });
                    alert(`Request ${status} successfully!`);
                } catch (error) {
                    alert("Error updating request: " + error.message);
                }
            }
        };

        window.goToPage = (page) => {
            currentPage = page;
            renderRequests();
        };

        // Event listeners
        searchInput.addEventListener('input', () => {
            currentPage = 1;
            filterAndRenderRequests();
        });

        dateFilter.addEventListener('change', () => {
            currentPage = 1;
            filterAndRenderRequests();
        });

        blockFilter.addEventListener('change', () => {
            currentPage = 1;
            filterAndRenderRequests();
        });

        refreshBtn.addEventListener('click', () => {
            loadMoveOutRequests();
        });

        document.getElementById('prevPage').addEventListener('click', () => {
            if (currentPage > 1) {
                currentPage--;
                renderRequests();
            }
        });

        document.getElementById('nextPage').addEventListener('click', () => {
            const totalPages = Math.ceil(filteredRequests.length / itemsPerPage);
            if (currentPage < totalPages) {
                currentPage++;
                renderRequests();
            }
        });
    </script>
</body>
</html>
