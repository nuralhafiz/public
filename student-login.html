<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>GMI HostelKu | Student Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-deep: #0a0e27;
            --bg-dark: #0f1638;
            --accent-lime: #ccff00;
            --accent-lime-glow: rgba(204, 255, 0, 0.25);
            --accent-red: #ff3131;
            --accent-red-glow: rgba(255, 49, 49, 0.25);
            --text-white: #ffffff;
            --text-offwhite: #f0f3fa;
            --glass-white: rgba(255, 255, 255, 0.08);
            --glass-border: rgba(255, 255, 255, 0.12);
            --shadow-xl: 0 25px 40px -12px rgba(0, 0, 0, 0.35);
            --transition-smooth: all 0.4s cubic-bezier(0.2, 0.9, 0.4, 1.1);
        }

        body, html {
            margin: 0;
            padding: 0;
            font-family: 'Poppins', sans-serif;
            height: 100vh;
            overflow: hidden;
            background-color: var(--bg-deep);
        }

        /* animated gradient background for depth */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 20% 30%, rgba(15, 22, 86, 0.6), #070b1f);
            z-index: -2;
        }

        /* Split container - full screen */
        .split-container {
            display: flex;
            height: 100vh;
            width: 100vw;
            position: relative;
            overflow: hidden;
        }

        /* IMAGE SECTION */
        .image-section {
            flex: 1.5;
            position: relative;
            overflow: hidden;
            height: 100vh;
            background-color: var(--bg-dark);
        }

        /* Background animation with Ken Burns zoom effect - improved with explicit images and fallback */
        .image-section .bg-animation {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            animation: studentKenBurns 16s infinite alternate ease-in-out;
            z-index: 0;
            transition: transform 0.6s;
        }

        @keyframes studentKenBurns {
            0% { 
                background-image: linear-gradient(rgba(15, 22, 56, 0.4), rgba(15, 22, 56, 0.5)), url('images/Hostel-1-1.jpg');
                transform: scale(1);
            }
            45% { 
                background-image: linear-gradient(rgba(15, 22, 56, 0.4), rgba(15, 22, 56, 0.5)), url('images/Hostel-1-1.jpg');
                transform: scale(1.05);
            }
            55% { 
                background-image: linear-gradient(rgba(15, 22, 56, 0.4), rgba(15, 22, 56, 0.5)), url('images/HOSTEL-BILIK-7-scaled.jpg');
                transform: scale(1.05);
            }
            100% { 
                background-image: linear-gradient(rgba(15, 22, 56, 0.4), rgba(15, 22, 56, 0.5)), url('images/HOSTEL-BILIK-7-scaled.jpg');
                transform: scale(1.1);
            }
        }

        .image-section:hover .bg-animation {
            transform: scale(1.12);
            transition: transform 0.9s ease-out;
        }

        /* FLOATING BUBBLE EFFECT */
        .image-section .floating-bubbles {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 5;
            overflow: hidden;
        }

        .image-section .bubble {
            position: absolute;
            background: rgba(204, 255, 0, 0.18);
            border-radius: 50%;
            filter: blur(4px);
            animation: floatBubble 22s infinite;
        }

        @keyframes floatBubble {
            0% { transform: translateY(0) translateX(0) rotate(0deg); opacity: 0; }
            15% { opacity: 0.5; }
            85% { opacity: 0.3; }
            100% { transform: translateY(-110vh) translateX(40px) rotate(380deg); opacity: 0; }
        }

        .image-section::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(circle at 30% 40%, rgba(204, 255, 0, 0.1) 0%, transparent 70%);
            z-index: 2;
            pointer-events: none;
        }

        .image-section::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(circle at 70% 80%, rgba(255, 49, 49, 0.08) 0%, transparent 70%);
            z-index: 2;
            pointer-events: none;
        }

        /* LOGO AND TAGLINE CONTAINER - CENTERED, TAGLINE NOW AT BOTTOM OF LOGO GROUP */
        .logo-overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 30;
            text-align: center;
            width: 100%;
            pointer-events: none;
            animation: fadeInScale 0.8s ease-out;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        @keyframes fadeInScale {
            from {
                opacity: 0;
                transform: translate(-50%, -50%) scale(0.9);
            }
            to {
                opacity: 1;
                transform: translate(-50%, -50%) scale(1);
            }
        }

        /* Logo styling - enhanced */
        .brand-logo {
            font-size: 60px;
            font-weight: 800;
            display: inline-flex;
            align-items: baseline;
            justify-content: center;
            text-shadow: 0 4px 20px rgba(0,0,0,0.5);
            position: relative;
            letter-spacing: -1px;
        }
        
        /* GMI wrapper with dot above I - improved positioning and dot size */
        
        
        
        
        /* BIGGER & BOLDER RED DOT positioned perfectly above the letter "I" */
        
        
        

        /* Tagline styling - NOW POSITIONED BELOW the main logo (bottom of GMI HostelKu group) */
        .tagline {
            color: rgba(255,255,245,0.96);
            font-weight: 500;
            font-size: 1rem;
            margin-top: 20px;
            letter-spacing: 0.8px;
            text-shadow: 0 2px 12px rgba(0,0,0,0.5);
            background: rgba(0, 0, 0, 0.3);
            display: inline-block;
            padding: 8px 28px;
            border-radius: 60px;
            backdrop-filter: blur(4px);
            border: 1px solid rgba(204, 255, 0, 0.3);
            transition: all 0.3s ease;
        }
        
        .tagline i {
            margin-right: 10px;
            font-size: 0.9rem;
            color: var(--accent-lime);
        }

        /* Back button */
        .back-arrow {
            position: absolute;
            top: 25px;
            left: 25px;
            cursor: pointer;
            z-index: 20;
            background: rgba(0, 0, 0, 0.45);
            backdrop-filter: blur(8px);
            border-radius: 50%;
            width: 48px;
            height: 48px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            border: 1px solid rgba(255,255,255,0.2);
        }

        .back-arrow:hover {
            background: rgba(0, 0, 0, 0.7);
            transform: translateX(-6px);
            border-color: var(--accent-lime);
        }

        .back-arrow svg {
            width: 26px;
            height: 26px;
        }

        .back-arrow svg path {
            stroke: white;
            stroke-width: 2.5;
        }

        /* LOGIN SECTION */
        .login-section {
            flex: 1;
            background: linear-gradient(135deg, #ffffff 0%, #f8faff 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 40px;
            position: relative;
            overflow-y: auto;
        }

        .login-container {
            width: 100%;
            max-width: 420px;
            text-align: center;
            animation: fadeInUp 0.55s ease-out;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        h2 { 
            font-weight: 700; 
            font-size: 30px; 
            margin-bottom: 35px;
            color: #0f172a;
            letter-spacing: -0.3px;
            background: linear-gradient(135deg, #1e293b, #334155);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .form-group {
            margin-bottom: 24px;
        }

        .input-wrapper {
            position: relative;
        }

        .input-icon {
            position: absolute;
            left: 18px;
            top: 50%;
            transform: translateY(-50%);
            color: #94a3b8;
            font-size: 18px;
            transition: color 0.3s;
        }

        input {
            width: 100%;
            padding: 16px 18px 16px 48px;
            border-radius: 16px;
            border: 2px solid #e2e8f0;
            outline: none;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
            font-size: 15px;
            transition: all 0.3s ease;
            background: white;
            font-weight: 500;
        }

        input:focus {
            border-color: #4facfe;
            box-shadow: 0 0 0 4px rgba(79, 172, 254, 0.15);
        }

        .forgot-password {
            display: block;
            text-align: right;
            color: #4facfe;
            font-size: 13px;
            text-decoration: none;
            margin-bottom: 32px;
            cursor: pointer;
            font-weight: 600;
            transition: color 0.3s;
        }

        .forgot-password:hover {
            color: #00e676;
            text-decoration: underline;
        }

        .btn {
            width: 100%;
            padding: 15px;
            border-radius: 50px;
            border: none;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            margin-bottom: 18px;
            font-family: 'Poppins', sans-serif;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .btn-login { 
            background: linear-gradient(95deg, #4facfe, #00f2fe);
            color: white;
            box-shadow: 0 6px 18px rgba(79, 172, 254, 0.35);
        }

        .btn-login:hover { 
            transform: translateY(-3px);
            box-shadow: 0 12px 28px rgba(79, 172, 254, 0.45);
        }

        .btn-create { 
            background: linear-gradient(95deg, #00e676, #69f0ae);
            color: #1a2a32;
            box-shadow: 0 6px 18px rgba(0, 230, 118, 0.3);
        }

        .btn-create:hover { 
            transform: translateY(-3px);
            box-shadow: 0 12px 28px rgba(0, 230, 118, 0.4);
        }

        .btn:active {
            transform: translateY(0);
        }

        .divider {
            display: flex;
            align-items: center;
            margin: 25px 0 20px;
            color: #cbd5e0;
            font-size: 13px;
        }

        .divider-line {
            flex: 1;
            height: 1px;
            background: linear-gradient(90deg, transparent, #cbd5e0, transparent);
        }

        .divider-text {
            padding: 0 18px;
            font-weight: 500;
        }

        .btn-loading {
            opacity: 0.8;
            cursor: not-allowed;
        }

        .btn-loading::after {
            content: '';
            position: absolute;
            width: 20px;
            height: 20px;
            top: 50%;
            right: 24px;
            margin-top: -10px;
            border: 2.5px solid white;
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Responsive fine-tune */
        @media (max-width: 900px) {
            .brand-logo { font-size: 48px; }
            
            .tagline { font-size: 0.85rem; padding: 6px 20px; margin-top: 15px; }
        }

        @media (max-width: 768px) {
            .split-container { flex-direction: column; }
            .image-section { min-height: 38vh; flex: none; height: auto; }
            .brand-logo { font-size: 44px; }
            
            .tagline { font-size: 0.75rem; padding: 5px 16px; margin-top: 12px; }
            .login-section { padding: 35px 24px; min-height: 62vh; }
            h2 { font-size: 26px; margin-bottom: 28px; }
            .back-arrow { bottom: 20px; left: 20px; width: 42px; height: 42px; }
        }

        @media (max-width: 480px) {
            .login-container { max-width: 100%; }
            input { padding: 13px 12px 13px 44px; font-size: 14px; }
            .btn { padding: 13px; }
            .image-section { min-height: 34vh; }
            .brand-logo { font-size: 36px; }
            
            .tagline { font-size: 0.7rem; padding: 4px 12px; margin-top: 10px; }
            .tagline i { font-size: 0.7rem; margin-right: 6px; }
        }
    </style>

    <style id="unified-logo-style">
        .gmi-wrapper {
            position: relative;
            display: inline-block;
            line-height: 1;
            padding-right: 0.05em; /* Padding for the wrapper */
        }
        .brand-blue {
            color: #1118a8; /* Deep blue from image */
            font-weight: 900;
            font-family: 'Arial', sans-serif;
            letter-spacing: -1px;
            text-shadow: 
                -0.8px -0.8px 0 #fff, 0px -0.8px 0 #fff, 0.8px -0.8px 0 #fff, 0.8px 0px 0 #fff, 0.8px 0.8px 0 #fff, 0px 0.8px 0 #fff, -0.8px 0.8px 0 #fff, -0.8px 0px 0 #fff, 0 4px 6px rgba(0,0,0,0.3);
        }
        .brand-dot {
            position: absolute;
            top: -0.24em;
            right: 0.05em;
            /* Shifted to perfectly align over the I */
            width: 0.32em;
            height: 0.32em;
            background-color: #f93144;
            /* Red dot from image */
            border-radius: 50%;
            box-shadow: 0 0 0 0.8px #fff, 0 4px 6px rgba(0, 0, 0, 0.3);
        }
        .brand-lime {
            color: #ccff00;
            margin-left: 5px;
            font-family: 'Poppins', sans-serif;
            font-weight: 800;
            text-shadow: 
                -0.8px -0.8px 0 #000, 0px -0.8px 0 #000, 0.8px -0.8px 0 #000, 0.8px 0px 0 #000, 0.8px 0.8px 0 #000, 0px 0.8px 0 #000, -0.8px 0.8px 0 #000, -0.8px 0px 0 #000, 0 4px 6px rgba(0,0,0,0.3);
        }
        /* Increased font size for dashboards */
        .brand-container {
            font-size: 32px !important;
        }
    </style>
</head>
<body>

<div class="split-container">
    <!-- IMAGE SECTION with dynamic visuals -->
    <div class="image-section">
        <div class="bg-animation"></div>
        <div class="floating-bubbles" id="bubbleContainer"></div>
        
        <!-- LOGO AND TAGLINE - Tagline now explicitly placed at the bottom of the logo group -->
        <div class="logo-overlay">
            <div class="brand-logo">
            <span class="gmi-wrapper"><span class="brand-blue">GMI</span><span class="brand-dot"></span></span><span class="brand-lime">HostelKu.</span>
        </div>
            <!-- Tagline now directly below the brand logo, as requested: bottom of GMI HostelKu -->
            <div class="tagline">
                <i class="fas fa-door-open"></i> Seamless Living Experience
            </div>
        </div>
        
        <!-- BACK ARROW linking to main index -->
        <a href="index.html" class="back-arrow" aria-label="Back to Home">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M10 19l-7-7m0 0l7-7m-7 7h18" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
        </a>
    </div>

    <!-- LOGIN SECTION with Firebase Integration -->
    <div class="login-section">
        <div class="login-container">
            <h2>Student Login</h2>

            <form id="loginForm">
                <div class="form-group">
                    <div class="input-wrapper">
                        <i class="fas fa-envelope input-icon"></i>
                        <input type="email" id="email" placeholder="student@student.gmi.edu.my" required autocomplete="email">
                    </div>
                </div>
                <div class="form-group">
                    <div class="input-wrapper">
                        <i class="fas fa-lock input-icon"></i>
                        <input type="password" id="password" placeholder="Enter your password" required autocomplete="current-password">
                    </div>
                </div>

                <a id="forgotPasswordBtn" class="forgot-password">Forgot Password?</a>

                <button type="submit" id="loginBtn" class="btn btn-login">
                    <span>Login →</span>
                </button>
                
                <div class="divider">
                    <div class="divider-line"></div>
                    <span class="divider-text">New to HostelKu?</span>
                    <div class="divider-line"></div>
                </div>
                
                <a href="register.html" style="text-decoration: none;">
                    <button type="button" class="btn btn-create">Create an Account</button>
                </a>
            </form>
        </div>
    </div>
</div>

<script>
    (function() {
        // Enhanced floating bubbles with improved variety and colors matching lime/red accents
        function createBubbles() {
            const container = document.getElementById('bubbleContainer');
            if (!container) return;
            
            const colors = ['#ccff00', '#ff4d4d', '#3b82f6', '#a5f0ff', '#00e676', '#ffaa33'];
            
            for (let i = 0; i < 55; i++) {
                const bubble = document.createElement('div');
                bubble.classList.add('bubble');
                const size = Math.random() * 14 + 4;
                bubble.style.width = size + 'px';
                bubble.style.height = size + 'px';
                bubble.style.left = Math.random() * 100 + '%';
                bubble.style.bottom = '-40px';
                bubble.style.animationDelay = Math.random() * 20 + 's';
                bubble.style.animationDuration = 13 + Math.random() * 18 + 's';
                const colorChoice = colors[Math.floor(Math.random() * colors.length)];
                bubble.style.background = colorChoice;
                bubble.style.opacity = Math.random() * 0.55 + 0.1;
                bubble.style.boxShadow = `0 0 12px ${colorChoice}80`;
                container.appendChild(bubble);
            }
        }
        
        createBubbles();

        // Preload images for smoother transition
        const imagesToPreload = [
            'images/Hostel-1-1.jpg',
            'images/HOSTEL-BILIK-7-scaled.jpg'
        ];
        imagesToPreload.forEach(src => {
            const img = new Image();
            img.src = src;
        });
        
        // Additional fallback: if images missing, background still solid - no errors.
    })();
</script>

<!-- Firebase Modular SDK with all required auth methods -->
<script type="module">
    import { getAuth, signInWithEmailAndPassword, sendPasswordResetEmail, setPersistence, browserSessionPersistence } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    // Firebase configuration (same as original but verified)
    import { auth } from "./js/firebase-config.js";
    import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    // RBAC Auto-Redirect: If already logged in, redirect to correct dashboard
    onAuthStateChanged(auth, (user) => {
        if (user) {
            const email = user.email ? user.email.toLowerCase() : '';
            if (email.endsWith('@student.gmi.edu.my')) {
                window.location.href = 'student-dashboard.html';
            } else {
                window.location.href = 'warden-dashboard.html';
            }
        }
    });

    const loginBtn = document.getElementById('loginBtn');
    const emailInput = document.getElementById('email');
    const passwordInput = document.getElementById('password');
    const forgotBtn = document.getElementById('forgotPasswordBtn');

    // Login handler
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const email = emailInput.value.trim();
        const password = passwordInput.value;

        if (!email) {
            alert("📧 Please enter your email address.");
            emailInput.focus();
            return;
        }
        if (!email.endsWith('@student.gmi.edu.my')) {
            alert("❌ Invalid email format! Please use your official @student.gmi.edu.my email address.");
            emailInput.focus();
            return;
        }
        if (password.length === 0) {
            alert("🔒 Please enter your password.");
            passwordInput.focus();
            return;
        }

        // Loading state
        loginBtn.classList.add('btn-loading');
        loginBtn.disabled = true;
        const originalText = loginBtn.innerHTML;
        loginBtn.innerHTML = '<span>Authenticating...</span>';

        try {
            await signInWithEmailAndPassword(auth, email, password);
            // Redirect to student dashboard on success
            window.location.href = "student-dashboard.html";
        } catch (error) {
            let errorMessage = "Login Failed: ";
            switch (error.code) {
                case 'auth/user-not-found':
                    errorMessage += "No account found with this email. Please create an account.";
                    break;
                case 'auth/wrong-password':
                    errorMessage += "Incorrect password. Please try again or reset your password.";
                    break;
                case 'auth/invalid-email':
                    errorMessage += "Invalid email format.";
                    break;
                case 'auth/too-many-requests':
                    errorMessage += "Too many failed attempts. Please try again later.";
                    break;
                default:
                    errorMessage += error.message;
            }
            alert(errorMessage);
        } finally {
            loginBtn.classList.remove('btn-loading');
            loginBtn.disabled = false;
            loginBtn.innerHTML = originalText;
        }
    });

    // Forgot password handler with enhanced UX
    forgotBtn.addEventListener('click', async () => {
        const emailAddress = emailInput.value.trim();

        if (!emailAddress) {
            alert("📧 Please enter your email address first to reset your password.");
            emailInput.focus();
            return;
        }

        if (!emailAddress.endsWith('@student.gmi.edu.my')) {
            alert("❌ Invalid email format! Password reset requires your @student.gmi.edu.my email address.");
            emailInput.focus();
            return;
        }

        // Provide visual feedback on the forgot button
        const originalText = forgotBtn.innerText;
        forgotBtn.innerText = "Sending reset link...";
        forgotBtn.style.opacity = "0.7";
        forgotBtn.style.cursor = "wait";
        forgotBtn.style.pointerEvents = "none";

        try {
            await sendPasswordResetEmail(auth, emailAddress);
            alert(`✅ Password reset email sent!\nWe've sent a secure link to ${emailAddress}.\n\n📬 Please check your inbox (and spam folder) to reset your password.`);
        } catch (error) {
            let errorMsg = "Reset Error: ";
            switch (error.code) {
                case 'auth/user-not-found':
                    errorMsg += "No account exists with this email address. Please register first.";
                    break;
                case 'auth/invalid-email':
                    errorMsg += "The email address is not valid.";
                    break;
                default:
                    errorMsg += error.message;
            }
            alert(errorMsg);
        } finally {
            forgotBtn.innerText = originalText;
            forgotBtn.style.opacity = "1";
            forgotBtn.style.cursor = "pointer";
            forgotBtn.style.pointerEvents = "auto";
        }
    });
</script>
</body>
