<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GMI HostelKu | Create Account</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-light: #f0f3fa;
            --primary-blue: #2d72d2;
            --dark-blue: #1e3a8a;
            --text-dark: #1e293b;
            --text-gray: #64748b;
            --accent-red: #ff3131;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Poppins', sans-serif;
            background-color: var(--bg-light);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .register-container {
            width: 100%;
            max-width: 420px;
            background: #ffffff;
            padding: 40px;
            border-radius: 24px;
            text-align: center;
            color: var(--text-dark);
            box-shadow: 0 15px 40px rgba(0,0,0,0.08);
            border: 1px solid rgba(0,0,0,0.02);
        }

        .gmi-wrapper {
            position: relative;
            display: inline-block;
            line-height: 1;
            padding-right: 0.05em;
        }
        .brand-blue {
            color: #1118a8;
            font-weight: 900;
            font-family: 'Arial', sans-serif;
            letter-spacing: -1px;
            text-shadow: 
                -0.8px -0.8px 0 #fff, 0px -0.8px 0 #fff, 0.8px -0.8px 0 #fff, 0.8px 0px 0 #fff, 0.8px 0.8px 0 #fff, 0px 0.8px 0 #fff, -0.8px 0.8px 0 #fff, -0.8px 0px 0 #fff, 0 4px 6px rgba(0,0,0,0.3);
        }
        .brand-dot {
            position: absolute;
            top: -0.24em;
            right: 0.05em;
            width: 0.32em;
            height: 0.32em;
            background-color: #f93144;
            border-radius: 50%;
            box-shadow: 0 0 0 0.8px #fff, 0 4px 6px rgba(0, 0, 0, 0.3);
        }
        .brand-lime {
            color: #ccff00;
            margin-left: 5px;
            font-family: 'Poppins', sans-serif;
            font-weight: 800;
            text-shadow: 
                -1px -1px 0 #000, 0px -1px 0 #000, 1px -1px 0 #000, 1px 0px 0 #000, 1px 1px 0 #000, 0px 1px 0 #000, -1px 1px 0 #000, -1px 0px 0 #000, 0 4px 6px rgba(0,0,0,0.3);
        }

        .brand-logo {
            font-size: 32px !important;
            font-weight: 700;
            margin-bottom: 5px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        h2 { 
            font-weight: 500; 
            margin-bottom: 30px; 
            font-size: 22px;
            position: relative;
            color: var(--text-dark);
        }

        h2:after {
            content: '';
            display: block;
            width: 50px;
            height: 4px;
            background: var(--primary-blue);
            margin: 15px auto 0;
            border-radius: 2px;
        }

        .form-group { 
            margin-bottom: 22px; 
            text-align: left; 
        }
        
        label { 
            font-size: 13px; 
            font-weight: 500;
            color: var(--text-gray); 
            margin-left: 5px;
            display: block;
            margin-bottom: 8px;
        }

        input {
            width: 100%;
            padding: 15px;
            border-radius: 12px;
            border: 1px solid #e2e8f0;
            background: #f8fafc;
            color: var(--text-dark);
            outline: none;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
            transition: all 0.3s ease;
            font-size: 14px;
        }

        input:focus {
            border-color: var(--primary-blue);
            background: #ffffff;
            box-shadow: 0 0 0 3px rgba(45, 114, 210, 0.15);
        }

        input::placeholder {
            color: #94a3b8;
            font-size: 13px;
        }

        .btn-submit {
            width: 100%;
            padding: 15px;
            border-radius: 30px;
            background: linear-gradient(135deg, var(--dark-blue) 0%, var(--primary-blue) 100%);
            border: none;
            color: white;
            font-weight: 600;
            font-size: 16px;
            cursor: pointer;
            margin-top: 15px;
            transition: all 0.3s;
            box-shadow: 0 10px 20px rgba(45, 114, 210, 0.25);
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 30px rgba(45, 114, 210, 0.35);
        }

        .login-link {
            display: inline-block;
            margin-top: 25px;
            font-size: 14px;
            color: var(--text-gray);
            text-decoration: none;
            transition: color 0.3s;
            font-weight: 500;
        }

        .login-link span {
            color: var(--primary-blue);
            font-weight: 600;
        }

        .login-link:hover span {
            text-decoration: underline;
        }

        .email-hint {
            font-size: 11px;
            color: var(--primary-blue);
            margin-top: 6px;
            margin-left: 5px;
            text-align: left;
            font-weight: 500;
        }
    </style>
</head>
<body>

    <div class="register-container">
        <div class="brand-logo">
            <span class="gmi-wrapper"><span class="brand-blue">GMI</span><span class="brand-dot"></span></span><span class="brand-lime">HostelKu.</span>
        </div>
        <h2>Create Student Account</h2>

        <form id="registerForm">
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" id="fullName" placeholder="Enter your full name" required>
            </div>
            <div class="form-group">
                <label>GMI Student Email</label>
                <input type="email" id="email" placeholder="username@student.gmi.edu.my" 
                       pattern=".*@student\\.gmi\\.edu\\.my$" 
                       title="Please use your official @student.gmi.edu.my email address" 
                       required>
                <div class="email-hint">Must end with @student.gmi.edu.my</div>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="password" placeholder="Minimum 6 characters" minlength="6" required>
            </div>
            <button type="submit" class="btn-submit">Sign Up</button>
        </form>

        <a href="student-login.html" class="login-link">Already have an account? <span>Login here</span></a>
    </div>

    <script type="module">
        import { getAuth, createUserWithEmailAndPassword, updateProfile } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        import { auth, db } from "./js/firebase-config.js";

        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const fullName = document.getElementById('fullName').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            // Double-check email domain (additional validation)
            if (!email.endsWith('@student.gmi.edu.my')) {
                alert("Please use your official @student.gmi.edu.my email address.");
                return;
            }

            try {
                const userCredential = await createUserWithEmailAndPassword(auth, email, password);
                
                // Update profile with display name
                await updateProfile(userCredential.user, {
                    displayName: fullName
                });

                alert("✅ Account Created Successfully!\\n\\nYou can now login with your GMI student email.");
                window.location.href = "student-login.html";
            } catch (error) {
                let errorMessage = "Registration Failed: ";
                switch(error.code) {
                    case 'auth/email-already-in-use':
                        errorMessage += "This email is already registered. Please login instead.";
                        break;
                    case 'auth/weak-password':
                        errorMessage += "Password should be at least 6 characters.";
                        break;
                    case 'auth/invalid-email':
                        errorMessage += "Please enter a valid email address.";
                        break;
                    default:
                        errorMessage += error.message;
                }
                alert(errorMessage);
            }
        });
    </script>
</body>
</html>
