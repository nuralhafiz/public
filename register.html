<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GMI HostelKu | Create Account</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0f1638;
            --accent-lime: #ccff00;
            --text-white: #ffffff;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Poppins', sans-serif;
            background-color: var(--bg-dark);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .register-container {
            width: 100%;
            max-width: 400px;
            background: rgba(255, 255, 255, 0.05);
            padding: 40px;
            border-radius: 15px;
            text-align: center;
            color: var(--text-white);
            box-shadow: 0 15px 35px rgba(0,0,0,0.3);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
        }

        .brand-logo { 
            font-size: 28px; 
            font-weight: 700; 
            margin-bottom: 15px; 
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .brand-blue { color: #2d72d2; }
        .brand-lime { color: var(--accent-lime); }
        .brand-dot { 
            color: red; 
            font-size: 24px;
            margin: 0 2px;
            position: relative;
            top: -12px;
        }

        h2 { 
            font-weight: 300; 
            margin-bottom: 30px; 
            font-size: 24px;
            position: relative;
        }

        h2:after {
            content: '';
            display: block;
            width: 50px;
            height: 3px;
            background: var(--accent-lime);
            margin: 15px auto 0;
            border-radius: 2px;
        }

        .form-group { 
            margin-bottom: 20px; 
            text-align: left; 
        }
        
        label { 
            font-size: 13px; 
            color: #aaa; 
            margin-left: 5px;
            display: block;
            margin-bottom: 5px;
        }

        input {
            width: 100%;
            padding: 14px;
            border-radius: 8px;
            border: 1px solid rgba(255,255,255,0.2);
            background: rgba(255,255,255,0.1);
            color: white;
            outline: none;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
            transition: all 0.3s;
        }

        input:focus {
            border-color: var(--accent-lime);
            background: rgba(255,255,255,0.15);
        }

        input::placeholder {
            color: rgba(255,255,255,0.5);
            font-size: 13px;
        }

        .btn-submit {
            width: 100%;
            padding: 14px;
            border-radius: 30px;
            border: none;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            font-weight: 600;
            font-size: 16px;
            cursor: pointer;
            margin-top: 25px;
            transition: all 0.3s;
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 30px rgba(102, 126, 234, 0.4);
        }

        .login-link {
            display: block;
            margin-top: 25px;
            font-size: 14px;
            color: #3b82f6;
            text-decoration: none;
            transition: color 0.3s;
        }

        .login-link:hover {
            color: var(--accent-lime);
            text-decoration: underline;
        }

        .email-hint {
            font-size: 11px;
            color: var(--accent-lime);
            margin-top: 5px;
            text-align: left;
        }
    </style>
</head>
<body>

    <div class="register-container">
        <div class="brand-logo">
            <span class="brand-blue">GMI</span><span class="brand-dot">•</span><span class="brand-lime">HostelKu.</span>
        </div>
        <h2>Create Student Account</h2>

        <form id="registerForm">
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" id="fullName" placeholder="Enter your full name" required>
            </div>
            <div class="form-group">
                <label>GMI Student Email</label>
                <input type="email" id="email" placeholder="username@student.gmi.edu.my" 
                       pattern=".*@student\.gmi\.edu\.my$" 
                       title="Please use your official @student.gmi.edu.my email address" 
                       required>
                <div class="email-hint">Must end with @student.gmi.edu.my</div>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="password" placeholder="Minimum 6 characters" minlength="6" required>
            </div>
            <button type="submit" class="btn-submit">Sign Up</button>
        </form>

        <a href="student-login.html" class="login-link">Already have an account? Login here</a>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, updateProfile } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBUIG4ZIanXbeEPeqaBO5ifkH_KiAg5M8w",
            authDomain: "gmi-hostelku.firebaseapp.com",
            projectId: "gmi-hostelku",
            storageBucket: "gmi-hostelku.firebasestorage.app",
            messagingSenderId: "556053021509",
            appId: "1:556053021509:web:d64966c34ae18e3d12f42c"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const fullName = document.getElementById('fullName').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            // Double-check email domain (additional validation)
            if (!email.endsWith('@student.gmi.edu.my')) {
                alert("Please use your official @student.gmi.edu.my email address.");
                return;
            }

            try {
                const userCredential = await createUserWithEmailAndPassword(auth, email, password);
                
                // Update profile with display name
                await updateProfile(userCredential.user, {
                    displayName: fullName
                });

                alert("✅ Account Created Successfully!\n\nYou can now login with your GMI student email.");
                window.location.href = "student-login.html";
            } catch (error) {
                let errorMessage = "Registration Failed: ";
                switch(error.code) {
                    case 'auth/email-already-in-use':
                        errorMessage += "This email is already registered. Please login instead.";
                        break;
                    case 'auth/weak-password':
                        errorMessage += "Password should be at least 6 characters.";
                        break;
                    case 'auth/invalid-email':
                        errorMessage += "Please enter a valid email address.";
                        break;
                    default:
                        errorMessage += error.message;
                }
                alert(errorMessage);
            }
        });
    </script>
</body>
</html>
