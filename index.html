<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>GMI HostelKu | Modern Hostel Management</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="css/global.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-deep: #0a0e27;
            --bg-dark: #0f1638;
            --accent-lime: #ccff00;
            --accent-lime-glow: rgba(204, 255, 0, 0.25);
            --accent-red: #ff3131;
            --accent-red-glow: rgba(255, 49, 49, 0.25);
            --text-white: #ffffff;
            --text-offwhite: #f0f3fa;
            --glass-white: rgba(255, 255, 255, 0.08);
            --glass-border: rgba(255, 255, 255, 0.12);
            --shadow-xl: 0 25px 40px -12px rgba(0, 0, 0, 0.35);
            --transition-smooth: all 0.4s cubic-bezier(0.2, 0.9, 0.4, 1.1);
        }

        body, html {
            margin: 0;
            padding: 0;
            font-family: 'Poppins', sans-serif;
            height: 100vh;
            overflow: hidden;
            background-color: var(--bg-deep);
        }

        /* animated gradient background for depth - NO BLUR LINE */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 20% 30%, rgba(15, 22, 86, 0.6), #070b1f);
            z-index: -2;
        }

        /* header overlay - clean, no extra blur causing line */
        .header-overlay {
            position: absolute;
            top: 60px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            text-align: center;
        }

        /* Original logo styling exactly like previous code */
        .brand-logo {
            font-size: 58px;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
            text-shadow: 0 4px 15px rgba(0,0,0,0.5);
            gap: 0;
        }
        
        
        
        
        
        

        /* Tagline directly below logo - matching original spacing */
        .tagline {
            color: rgba(255,255,245,0.92);
            font-weight: 400;
            font-size: 1rem;
            margin-top: 12px;
            letter-spacing: 0.5px;
            text-shadow: 0 1px 4px rgba(0,0,0,0.3);
            background: transparent;
            padding: 0;
            border-radius: 0;
        }
        
        .tagline i {
            margin-right: 6px;
            font-size: 0.85rem;
            opacity: 0.9;
        }

        /* split container premium */
        .split-container {
            display: flex;
            height: 100vh;
            width: 100vw;
            position: relative;
            overflow: hidden;
        }

        .role-section {
            flex: 1;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: flex 0.35s ease-out;
            cursor: pointer;
            text-decoration: none;
            overflow: hidden;
            isolation: isolate;
        }

        /* dynamic background overlays with modern gradients */
        .role-section::before {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(ellipse at 70% 30%, rgba(0,0,0,0.3) 0%, rgba(0,0,0,0.65) 100%);
            z-index: 0;
            transition: opacity 0.4s;
        }

        /* unique overlay for each side */
        .warden-side::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(125deg, rgba(255, 49, 49, 0.08) 0%, rgba(15, 22, 56, 0.4) 100%);
            z-index: 1;
            pointer-events: none;
        }

        .student-side::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(235deg, rgba(204, 255, 0, 0.08) 0%, rgba(15, 22, 56, 0.4) 100%);
            z-index: 1;
            pointer-events: none;
        }

        /* Warden Section Animation with your 3 photos (improved smoothness) */
        .warden-side .bg-animation {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            animation: wardenKenBurns 18s infinite ease-in-out;
            z-index: -1;
            transform: scale(1.02);
            transition: transform 0.6s;
        }

        @keyframes wardenKenBurns {
            0%, 25% { background-image: url('images/photo_2026-03-14_11-20-42.jpg'); transform: scale(1); }
            30%, 50% { background-image: url('images/photo_2026-03-14_11-20-43.jpg'); transform: scale(1.05); }
            55%, 80% { background-image: url('images/photo_2026-03-14_11-20-43\ \(2\).jpg'); transform: scale(1.03); }
            85%, 100% { background-image: url('images/photo_2026-03-14_11-20-42.jpg'); transform: scale(1); }
        }

        /* Student Section Animation (two hostel images) */
        .student-side .bg-animation {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            animation: studentKenBurns 14s infinite alternate ease-in-out;
            z-index: -1;
            transform: scale(1.02);
        }

        @keyframes studentKenBurns {
            0%, 45% { background-image: url('images/Hostel-1-1.jpg'); transform: scale(1); }
            55%, 100% { background-image: url('images/HOSTEL-BILIK-7-scaled.jpg'); transform: scale(1.08); }
        }

        /* hover effect: section grows with depth */
        .role-section:hover {
            flex: 1.3;
        }

        .role-section:hover .bg-animation {
            transform: scale(1.08);
            transition: transform 0.35s ease-out;
        }

        /* modern card content */
        .content {
            position: relative;
            z-index: 15;
            text-align: center;
            color: white;
            pointer-events: none;
            transform: translateY(0);
            transition: transform 0.3s ease;
        }

        .role-section:hover .content {
            transform: translateY(-6px);
        }

        .content h2 {
            font-size: 3.2rem;
            font-weight: 700;
            margin-bottom: 1.2rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            background: linear-gradient(135deg, #fff, #e0e7ff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 2px 15px rgba(0,0,0,0.3);
        }

        /* Unified Login Button Style */
        .btn-action {
            pointer-events: auto;
            padding: 15px 45px;
            border-radius: 50px;
            border: none;
            font-weight: 700;
            font-size: 16px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            cursor: pointer;
            font-family: 'Poppins', sans-serif;
            position: relative;
            overflow: hidden;
            background: linear-gradient(95deg, #4facfe, #00f2fe);
            color: white;
            box-shadow: 0 6px 18px rgba(79, 172, 254, 0.35);

        }

        .btn-action:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 28px rgba(79, 172, 254, 0.45);
        }

        .btn-action:active {
            transform: translateY(0);
        }

        /* ripple effect for buttons */
        .btn-action {
            position: relative;
            overflow: hidden;
        }

        .btn-action::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(0, 0, 0, 0.1);
            transform: translate(-50%, -50%);
            transition: width 0.5s, height 0.5s;
        }

        .btn-action:active::after {
            width: 300px;
            height: 300px;
            opacity: 0;
        }

        /* floating particles effect (subtle) - no top blur */
        .floating-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        .particle {
            position: absolute;
            background: rgba(204, 255, 0, 0.2);
            border-radius: 50%;
            filter: blur(3px);
            animation: float 20s infinite;
        }

        @keyframes float {
            0% { transform: translateY(0) rotate(0deg); opacity: 0; }
            20% { opacity: 0.5; }
            80% { opacity: 0.3; }
            100% { transform: translateY(-100vh) rotate(360deg); opacity: 0; }
        }

    
        .tap-hint {
            display: none;
            font-size: 0.7rem;
            margin-top: 10px;
            font-weight: 600;
            opacity: 0.9;
            letter-spacing: 1px;
            text-transform: uppercase;
            color: #ffffff;
            text-shadow: 0 2px 10px rgba(0,0,0,0.5);
            animation: pulseHint 2s infinite;
        }

        @keyframes pulseHint {
            0% { opacity: 0.7; transform: translateY(0); }
            50% { opacity: 1; transform: translateY(3px); }
            100% { opacity: 0.7; transform: translateY(0); }
        }

        /* responsive touches */
                @media (max-width: 780px) {
            .brand-logo { font-size: 32px; }
            
            .tagline { font-size: 0.8rem; margin-top: 8px; }
            .content h2 { font-size: 2rem; letter-spacing: 2px; }
            .btn-action { padding: 10px 30px; font-size: 12px; }
            .header-overlay { top: 20px; }
            .hint-tooltip { display: none !important; }
            .tap-hint { display: block; }
        }

                @media (max-width: 550px) {
            .split-container { flex-direction: column; }
            .role-section { min-height: 50vh; }
            .role-section:hover { flex: 1.1; }
            .content h2 { font-size: 1.8rem; }
            .brand-logo { font-size: 28px; }
            .hint-tooltip { display: none !important; }
            .tap-hint { display: block; }
        }

        /* hint tooltip - no extra blur line */
        .hint-tooltip {
            position: absolute;
            bottom: 28px;
            left: 0;
            right: 0;
            text-align: center;
            z-index: 30;
            pointer-events: none;
            font-size: 0.75rem;
            color: rgba(255,255,240,0.7);
            letter-spacing: 0.5px;
            width: fit-content;
            margin: 0 auto;
            background: rgba(0,0,0,0.45);
            padding: 6px 18px;
            border-radius: 60px;
            font-weight: 400;
            backdrop-filter: none;
            font-family: 'Poppins', sans-serif;
        }

        .hint-tooltip i {
            margin-right: 6px;
            font-size: 0.7rem;
        }

        </style>
    
</head>
<body>

<div class="floating-bg" id="particlesContainer"></div>

<div class="header-overlay">
    <!-- EXACT original logo appearance from previous code -->
    <div class="brand-logo">
            <span class="brand-blue">GM<span class="i-wrapper">I<span class="brand-dot"></span></span></span><span class="brand-lime">HostelKu.</span>
        </div>
    <!-- Tagline directly below logo as requested -->
    
</div>

<div class="split-container">
    <!-- WARDEN SECTION -->
    <a href="warden-login.html" class="role-section warden-side" id="wardenLink" title="Navigation Link">
        <div class="bg-animation"></div>
        <div class="content">
            <h2>Warden</h2>
            <div class="tap-hint">Tap to Login</div>
            <div style="margin-top: 20px; font-size: 0.75rem; opacity: 0.8; backdrop-filter: none;">
                <i class="fas fa-shield-alt"></i> Monitor & Manage
            </div>
        </div>
    </a>

    <!-- STUDENT SECTION -->
    <a href="student-login.html" class="role-section student-side" id="studentLink" title="Navigation Link">
        <div class="bg-animation"></div>
        <div class="content">
            <h2>Student</h2>
            <div class="tap-hint">Tap to Login</div>
            <div style="margin-top: 20px; font-size: 0.75rem; opacity: 0.8;">
                <i class="fas fa-graduation-cap"></i> Seamless Living Experience
            </div>
        </div>
    </a>
</div>

<div class="hint-tooltip">
    <i class="fas fa-mouse-pointer"></i> Hover over a section & click to continue
</div>

<script>
    (function() {
        // Enhance button click interactions (prevent double navigation, smooth delay)
        const wardenBtn = document.querySelector('#wardenLink .btn-action');
        const studentBtn = document.querySelector('#studentLink .btn-action');
        const wardenSection = document.getElementById('wardenLink');
        const studentSection = document.getElementById('studentLink');

        function handleNavigate(event, targetUrl) {
            if (!targetUrl) return;
            event.preventDefault();
            event.stopPropagation();
            // add micro-interaction
            const btn = event.currentTarget;
            if (btn && btn.classList.contains('btn-action')) {
                btn.style.transform = 'scale(0.97)';
                setTimeout(() => { btn.style.transform = ''; }, 120);
            }
            setTimeout(() => {
                window.location.href = targetUrl;
            }, 160);
        }

        if (wardenBtn) {
            wardenBtn.addEventListener('click', (e) => {
                e.preventDefault();
                e.stopPropagation();
                handleNavigate(e, 'warden-login.html?v=3');
            });
        }
        if (studentBtn) {
            studentBtn.addEventListener('click', (e) => {
                e.preventDefault();
                e.stopPropagation();
                handleNavigate(e, 'student-login.html?v=3');
            });
        }

        // ensure clicking on the whole section also leads to correct link (as backup)
        if (wardenSection) {
            wardenSection.addEventListener('click', (e) => {
                if (e.target.closest('.btn-action')) return;
                e.preventDefault();
                setTimeout(() => { window.location.href = 'warden-login.html?v=3'; }, 400);
            });
        }
        if (studentSection) {
            studentSection.addEventListener('click', (e) => {
                if (e.target.closest('.btn-action')) return;
                e.preventDefault();
                setTimeout(() => { window.location.href = 'student-login.html?v=3'; }, 400);
            });
        }

        // extra safety for any child link default
        document.querySelectorAll('.role-section').forEach(section => {
            section.addEventListener('click', (e) => {
                if (e.target.tagName === 'A') e.preventDefault();
            });
        });

        // Add smooth dynamic particles (modern micro interaction)
        function createParticles() {
            const container = document.getElementById('particlesContainer');
            if (!container) return;
            const colors = ['#ccff00', '#ff3131', '#3b82f6', '#ffffff80'];
            for (let i = 0; i < 35; i++) {
                const particle = document.createElement('div');
                particle.classList.add('particle');
                const size = Math.random() * 8 + 2;
                particle.style.width = size + 'px';
                particle.style.height = size + 'px';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.bottom = '-20px';
                particle.style.animationDelay = '-' + (Math.random() * 25) + 's';
                particle.style.animationDuration = 12 + Math.random() * 12 + 's';
                particle.style.background = colors[Math.floor(Math.random() * colors.length)];
                particle.style.opacity = Math.random() * 0.4 + 0.1;
                container.appendChild(particle);
            }
        }
        createParticles();

        // Preload images for smoother background transitions
        const imagesToPreload = [
            'images/photo_2026-03-14_11-20-42.jpg',
            'images/photo_2026-03-14_11-20-43.jpg',
            'images/photo_2026-03-14_11-20-43 (2).jpg',
            'images/Hostel-1-1.jpg',
            'images/HOSTEL-BILIK-7-scaled.jpg'
        ];
        imagesToPreload.forEach(src => {
            const img = new Image();
            img.src = src;
        });

        // subtle hover glow effect on each section (dynamic border) - no blur line
        const wardenDiv = document.querySelector('.warden-side');
        const studentDiv = document.querySelector('.student-side');
        
        if (wardenDiv) {
            wardenDiv.addEventListener('mouseenter', () => {
                wardenDiv.style.boxShadow = 'inset 0 0 0 2px rgba(255,49,49,0.5)';
            });
            wardenDiv.addEventListener('mouseleave', () => {
                wardenDiv.style.boxShadow = '';
            });
        }
        if (studentDiv) {
            studentDiv.addEventListener('mouseenter', () => {
                studentDiv.style.boxShadow = 'inset 0 0 0 2px rgba(204,255,0,0.5)';
            });
            studentDiv.addEventListener('mouseleave', () => {
                studentDiv.style.boxShadow = '';
            });
        }
        
        // add keyboard accessibility hint: focus states
        const allFocusable = document.querySelectorAll('.role-section');
        allFocusable.forEach(el => {
            el.setAttribute('tabindex', '0');
            el.addEventListener('keypress', (e) => {
                if (e.key === 'Enter' || e.key === ' ') {
                    e.preventDefault();
                    const link = el.getAttribute('href');
                    if (link) {
                        setTimeout(() => { window.location.href = link; }, 100);
                    }
                }
            });
        });
    })();
</script>
</body>
</html>
