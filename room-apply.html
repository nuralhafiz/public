<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GMI HostelKu - Room Application</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body { 
            font-family: 'Poppins', sans-serif; 
            margin: 0; 
            display: flex; 
            flex-direction: column; 
            height: 100vh; 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            overflow: hidden; 
        }
        
        /* Header Styling */
        header { 
            background: rgba(15, 22, 56, 0.95);
            backdrop-filter: blur(10px);
            color: white; 
            padding: 0 25px; 
            display: flex; 
            align-items: center; 
            justify-content: space-between; 
            z-index: 1000; 
            flex-shrink: 0; 
            height: 70px;
            box-shadow: 0 2px 20px rgba(0,0,0,0.1);
        }

        /* Logo Branding */
        .brand-container { 
            display: flex; 
            align-items: center; 
            font-size: 28px; 
            font-weight: 700; 
            cursor: pointer; 
            position: relative; 
            margin-left: 10px;
        }
        .brand-blue { 
            color: #2d72d2; 
            text-shadow: 0 2px 10px rgba(45, 114, 210, 0.3);
        }
        .brand-lime { 
            color: #ccff00; 
            margin-left: 5px;
            text-shadow: 0 2px 10px rgba(204, 255, 0, 0.3);
        }
        .brand-dot { 
            color: #ff3131; 
            font-size: 28px; 
            position: absolute; 
            top: -16px; 
            left: 42px;
            text-shadow: 0 2px 10px rgba(255, 49, 49, 0.3);
        }

        .menu-toggle { 
            cursor: pointer; 
            font-size: 22px; 
            color: white; 
            margin-right: 15px;
            transition: transform 0.3s;
        }
        .menu-toggle:hover {
            transform: scale(1.1);
        }

        /* Avatar in Header */
        .avatar-container {
            cursor: pointer;
            transition: all 0.3s;
        }
        .avatar-container:hover {
            transform: scale(1.1);
        }
        .avatar-container i {
            font-size: 36px;
            color: #ccff00;
            background: rgba(255,255,255,0.1);
            border-radius: 50%;
            padding: 5px;
            box-shadow: 0 0 20px rgba(204, 255, 0, 0.3);
        }
        
        .container { 
            display: flex; 
            flex: 1; 
            overflow: hidden; 
            position: relative; 
        }
        
        /* Sidebar Styling */
        nav { 
            width: 280px; 
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-right: 1px solid rgba(255,255,255,0.2); 
            padding: 25px 0;
            display: flex; 
            flex-direction: column; 
            transition: transform 0.3s ease; 
            z-index: 900; 
            overflow-y: auto;
            box-shadow: 5px 0 25px rgba(0,0,0,0.1);
        }

        .nav-menu {
            padding: 0 20px;
            flex: 1;
        }

        .nav-item { 
            display: flex; 
            align-items: center; 
            padding: 14px 20px; 
            margin-bottom: 8px; 
            text-decoration: none; 
            color: #333; 
            border-radius: 12px; 
            font-size: 15px; 
            font-weight: 500;
            transition: all 0.3s; 
            cursor: pointer; 
        }
        .nav-item:hover { 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white; 
            transform: translateX(5px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }
        .nav-item.active { 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white; 
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }
        .nav-item i { 
            margin-right: 12px; 
            font-size: 20px; 
            width: 24px; 
            text-align: center; 
        }
        
        .logout-btn { 
            margin: 20px 20px 15px 20px;
            color: #f44336; 
            border: 2px solid #f44336;
            background: transparent;
        }
        .logout-btn:hover { 
            background: #f44336; 
            color: white; 
            border-color: #f44336;
            transform: translateX(5px);
        }
        
        main { 
            flex: 1; 
            display: flex; 
            flex-direction: column; 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            overflow-y: auto; 
            padding: 30px;
        }

        .form-container { 
            flex: 1; 
            display: flex; 
            justify-content: center; 
            align-items: flex-start; 
            padding: 20px; 
        }

        .apply-card { 
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            width: 100%; 
            max-width: 900px; 
            padding: 45px; 
            border-radius: 30px; 
            box-shadow: 0 25px 50px rgba(0,0,0,0.2); 
            animation: slideUp 0.5s ease;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        h2 { 
            color: #0f1638; 
            font-size: 28px; 
            margin-bottom: 20px; 
            font-weight: 700;
            text-align: center;
            position: relative;
        }

        h2:after {
            content: '';
            display: block;
            width: 60px;
            height: 4px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            margin: 15px auto 0;
            border-radius: 2px;
        }

        .info-banner {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px 20px;
            border-radius: 12px;
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            gap: 15px;
            text-align: left;
        }

        .info-banner i {
            font-size: 24px;
            flex-shrink: 0;
        }

        .info-banner p {
            font-size: 14px;
            line-height: 1.6;
            margin: 0;
        }

        .section-title {
            color: #0f1638;
            font-size: 20px;
            font-weight: 600;
            margin: 30px 0 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid rgba(102, 126, 234, 0.3);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .section-title i {
            color: #667eea;
            font-size: 24px;
        }

        .section-title .section-letter {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            font-weight: 600;
            margin-right: 10px;
        }

        .form-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 15px;
        }

        .form-group { 
            margin-bottom: 20px; 
        }

        label { 
            display: block; 
            font-size: 14px; 
            font-weight: 600; 
            margin-bottom: 8px; 
            color: #0f1638;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        label i {
            margin-right: 8px;
            color: #667eea;
        }

        .required:after {
            content: '*';
            color: #f44336;
            margin-left: 4px;
        }

        input, select, textarea { 
            width: 100%; 
            padding: 15px 18px; 
            border: 2px solid #e0e0e0; 
            border-radius: 12px; 
            font-family: 'Poppins', sans-serif; 
            font-size: 15px; 
            transition: all 0.3s; 
            background: white;
        }

        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.1);
        }

        input:hover, select:hover, textarea:hover {
            border-color: #764ba2;
        }

        /* Declaration Section */
        .declaration-section {
            background: rgba(102, 126, 234, 0.1);
            padding: 30px;
            border-radius: 16px;
            margin: 30px 0 20px;
            border: 1px solid rgba(102, 126, 234, 0.2);
        }

        .checkbox-group {
            display: flex;
            align-items: flex-start;
            gap: 15px;
            margin-bottom: 25px;
        }

        .checkbox-group input[type="checkbox"] {
            width: 22px;
            height: 22px;
            margin-top: 3px;
            cursor: pointer;
            accent-color: #667eea;
            flex-shrink: 0;
        }

        .checkbox-group label {
            font-size: 15px;
            font-weight: 500;
            color: #333;
            text-transform: none;
            line-height: 1.6;
            cursor: pointer;
        }

        .date-group {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
        }

        .btn-submit { 
            width: 250px; 
            padding: 16px 30px; 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white; 
            border: none; 
            border-radius: 50px; 
            font-weight: 600; 
            font-size: 16px; 
            cursor: pointer; 
            margin: 30px auto 0;
            display: block;
            transition: all 0.3s; 
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        .btn-submit:hover { 
            transform: translateY(-3px);
            box-shadow: 0 15px 30px rgba(102, 126, 234, 0.4);
        }

        .btn-submit:active {
            transform: translateY(-1px);
        }

        .btn-submit i {
            margin-right: 8px;
        }

        /* Loading Spinner */
        .spinner {
            display: none;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s ease-in-out infinite;
            margin-left: 10px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .btn-submit.loading {
            opacity: 0.8;
            cursor: not-allowed;
        }

        .btn-submit.loading .spinner {
            display: inline-block;
        }

        /* Mobile Responsive */
        @media (max-width: 768px) {
            nav { 
                position: absolute; 
                left: 0; 
                top: 0; 
                bottom: 0; 
                transform: translateX(-100%); 
                box-shadow: 5px 0 25px rgba(0,0,0,0.2);
                width: 280px;
            }
            nav.open { 
                transform: translateX(0); 
            }
            
            .menu-overlay {
                display: none;
                position: fixed;
                top: 0;
                left: 0;
                right: 0;
                bottom: 0;
                background: rgba(0,0,0,0.5);
                z-index: 800;
                backdrop-filter: blur(3px);
            }
            .menu-overlay.active {
                display: block;
            }

            .form-row {
                grid-template-columns: 1fr;
                gap: 0;
            }

            .apply-card {
                padding: 25px;
            }

            h2 {
                font-size: 24px;
            }

            .btn-submit {
                width: 100%;
            }

            .info-banner {
                flex-direction: column;
                text-align: center;
                gap: 10px;
            }
        }

        /* Small mobile devices */
        @media (max-width: 480px) {
            .apply-card {
                padding: 20px 15px;
            }

            input, select, textarea {
                padding: 12px 15px;
                font-size: 14px;
            }

            label {
                font-size: 13px;
            }

            .info-banner {
                padding: 12px 15px;
            }

            .info-banner i {
                font-size: 20px;
            }

            .info-banner p {
                font-size: 13px;
            }

            .section-title {
                font-size: 18px;
            }

            .checkbox-group {
                flex-direction: column;
                gap: 10px;
            }
        }
    </style>
</head>
<body>
    <header>
        <div style="display: flex; align-items: center;">
            <i class="fas fa-bars menu-toggle" id="hamburger"></i>
            <div class="brand-container">
                <span class="brand-dot">•</span> <span class="brand-blue">GMI</span>
                <span class="brand-lime">-HK</span>
            </div>
        </div>
        <div style="display: flex; align-items: center; gap: 15px;">
            <!-- Avatar Icon that links to profile page -->
            <a href="student-profile.html" class="avatar-container">
                <i class="fas fa-user-circle"></i>
            </a>
        </div>
    </header>

    <!-- Overlay for mobile menu -->
    <div class="menu-overlay" id="menuOverlay"></div>

    <div class="container">
        <nav id="sidebar">
            <!-- Navigation Menu - My Profile at the top -->
            <div class="nav-menu">
                <a href="student-profile.html" class="nav-item"><i class="fas fa-user"></i> My Profile</a>
                <a href="student-dashboard.html" class="nav-item"><i class="fas fa-home"></i> Dashboard</a>
                <a href="room-apply.html" class="nav-item active"><i class="fas fa-check-circle"></i> Room Apply</a>
                <a href="move-out.html" class="nav-item"><i class="fas fa-box-open"></i> Move-Out</a>
                <a href="maintenance.html" class="nav-item"><i class="fas fa-tools"></i> Room Maintenance</a>
            </div>

            <!-- Logout Button at Bottom -->
            <a href="#" class="nav-item logout-btn" id="logoutBtn">
                <i class="fas fa-sign-out-alt"></i> Logout
            </a>
        </nav>
        
        <main id="mainContent">
            <div class="form-container">
                <div class="apply-card">
                    <h2>
                        <i class="fas fa-check-circle" style="margin-right: 10px; color: #667eea;"></i>
                        Room Application Form
                    </h2>
                    
                    <!-- Info Banner -->
                    <div class="info-banner">
                        <i class="fas fa-info-circle"></i>
                        <p>Please complete all sections below. Your application will be processed within 3-5 working days.</p>
                    </div>

                    <form id="applyForm">
                        <!-- Section A: Personal Details -->
                        <div class="section-title">
                            <span class="section-letter">A</span>
                            <i class="fas fa-user-graduate"></i>
                            Section A: Personal Details
                        </div>

                        <div class="form-row">
                            <div class="form-group">
                                <label class="required">
                                    <i class="fas fa-user"></i>
                                    Full Name
                                </label>
                                <input type="text" id="fullName" placeholder="Enter your full name" required>
                            </div>
                            <div class="form-group">
                                <label class="required">
                                    <i class="fas fa-id-card"></i>
                                    IC Number
                                </label>
                                <input type="text" id="icNumber" placeholder="e.g. 990101-01-1234" required>
                            </div>
                        </div>

                        <div class="form-row">
                            <div class="form-group">
                                <label class="required">
                                    <i class="fas fa-qrcode"></i>
                                    Student ID
                                </label>
                                <input type="text" id="studentId" placeholder="e.g. S12345" required>
                            </div>
                            <div class="form-group">
                                <label class="required">
                                    <i class="fas fa-book"></i>
                                    Course
                                </label>
                                <input type="text" id="course" placeholder="e.g. Diploma in IT" required>
                            </div>
                        </div>

                        <div class="form-row">
                            <div class="form-group">
                                <label class="required">
                                    <i class="fas fa-venus-mars"></i>
                                    Gender
                                </label>
                                <select id="gender" required>
                                    <option value="" disabled selected>Select Gender</option>
                                    <option value="Male">Male</option>
                                    <option value="Female">Female</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label class="required">
                                    <i class="fas fa-users"></i>
                                    Race
                                </label>
                                <select id="race" required>
                                    <option value="" disabled selected>Select Race</option>
                                    <option value="Malay">Malay</option>
                                    <option value="Chinese">Chinese</option>
                                    <option value="Indian">Indian</option>
                                    <option value="Others">Others</option>
                                </select>
                            </div>
                        </div>

                        <div class="form-row">
                            <div class="form-group">
                                <label class="required">
                                    <i class="fas fa-pray"></i>
                                    Religion
                                </label>
                                <input type="text" id="religion" placeholder="e.g. Islam" required>
                            </div>
                            <div class="form-group">
                                <label class="required">
                                    <i class="fas fa-phone-alt"></i>
                                    Phone Number
                                </label>
                                <input type="tel" id="phone" placeholder="e.g. 012-3456789" required>
                            </div>
                        </div>

                        <div class="form-row">
                            <div class="form-group">
                                <label>
                                    <i class="fas fa-phone"></i>
                                    Home Phone Number
                                </label>
                                <input type="tel" id="homePhone" placeholder="e.g. 03-12345678">
                            </div>
                            <div class="form-group">
                                <label class="required">
                                    <i class="fas fa-envelope"></i>
                                    Email
                                </label>
                                <input type="email" id="email" placeholder="e.g. student@example.com" required>
                            </div>
                        </div>

                        <div class="form-group">
                            <label class="required">
                                <i class="fas fa-map-marker-alt"></i>
                                Permanent Address
                            </label>
                            <textarea id="address" rows="3" placeholder="Enter your complete permanent address" required></textarea>
                        </div>

                        <!-- Section B: Declaration -->
                        <div class="section-title">
                            <span class="section-letter">B</span>
                            <i class="fas fa-file-signature"></i>
                            Section B: Declaration
                        </div>

                        <div class="declaration-section">
                            <div class="checkbox-group">
                                <input type="checkbox" id="declaration" required>
                                <label for="declaration">
                                    I hereby declare that all the information provided in this application is true, complete and accurate to the best of my knowledge. I understand that any false information may lead to rejection of my application or disciplinary action.
                                </label>
                            </div>

                            <div class="date-group">
                                <div class="form-group">
                                    <label class="required">
                                        <i class="fas fa-calendar-check"></i>
                                        Date of Declaration
                                    </label>
                                    <input type="date" id="declarationDate" required>
                                </div>
                                <div class="form-group">
                                    <label>
                                        <i class="fas fa-map-pin"></i>
                                        Place of Declaration
                                    </label>
                                    <input type="text" id="declarationPlace" placeholder="e.g. Kuala Lumpur" value="Kuala Lumpur">
                                </div>
                            </div>
                        </div>

                        <button type="submit" class="btn-submit" id="submitBtn">
                            <span>Submit Application</span>
                            <span class="spinner"></span>
                        </button>
                    </form>
                </div>
            </div>
        </main>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        
        const firebaseConfig = { 
            apiKey: "AIzaSyBUIG4ZIanXbeEPeqaBO5ifkH_KiAg5M8w", 
            authDomain: "gmi-hostelku.firebaseapp.com", 
            projectId: "gmi-hostelku", 
            storageBucket: "gmi-hostelku.firebasestorage.app", 
            messagingSenderId: "556053021509", 
            appId: "1:556053021509:web:d64966c34ae18e3d12f42c" 
        };
        
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        const hamburger = document.getElementById('hamburger');
        const sidebar = document.getElementById('sidebar');
        const mainContent = document.getElementById('mainContent');
        const menuOverlay = document.getElementById('menuOverlay');
        const submitBtn = document.getElementById('submitBtn');

        // Set today's date as default for declaration date
        document.addEventListener('DOMContentLoaded', () => {
            const today = new Date().toISOString().split('T')[0];
            document.getElementById('declarationDate').value = today;
        });

        // Function to close sidebar
        function closeSidebar() {
            sidebar.classList.remove('open');
            menuOverlay.classList.remove('active');
        }

        // Function to open sidebar
        function openSidebar() {
            sidebar.classList.add('open');
            menuOverlay.classList.add('active');
        }

        // Toggle sidebar on hamburger click
        hamburger.addEventListener('click', (e) => {
            e.stopPropagation();
            e.preventDefault();
            if (sidebar.classList.contains('open')) {
                closeSidebar();
            } else {
                openSidebar();
            }
        });

        // Close sidebar when clicking on overlay
        menuOverlay.addEventListener('click', () => {
            closeSidebar();
        });

        // Close sidebar when clicking on main content (mobile only)
        mainContent.addEventListener('click', () => {
            if (window.innerWidth <= 768 && sidebar.classList.contains('open')) {
                closeSidebar();
            }
        });

        // Handle window resize
        window.addEventListener('resize', () => {
            if (window.innerWidth > 768) {
                sidebar.classList.remove('open');
                menuOverlay.classList.remove('active');
            }
        });

        // Check if user is logged in and pre-fill email
        onAuthStateChanged(auth, (user) => { 
            if (user) { 
                // Store user info in session storage
                sessionStorage.setItem('userEmail', user.email);
                sessionStorage.setItem('userName', user.email.split('@')[0]);
                
                // Pre-fill email field with user's email
                document.getElementById('email').value = user.email;
                
                // Pre-fill name from session if available
                const savedName = sessionStorage.getItem('userName');
                if (savedName && !document.getElementById('fullName').value) {
                    document.getElementById('fullName').value = savedName;
                }
            } else { 
                window.location.href = "student-login.html"; 
            } 
        });

        // Logout button functionality
        document.getElementById('logoutBtn').addEventListener('click', (e) => { 
            e.preventDefault(); 
            signOut(auth).then(() => {
                sessionStorage.clear();
                window.location.href = "index.html"; 
            }).catch((error) => {
                alert("Logout failed: " + error.message);
            });
        });

        // Handle form submission with Firestore
        document.getElementById('applyForm').addEventListener('submit', async (e) => { 
            e.preventDefault(); 
            
            // Check if declaration is checked
            if (!document.getElementById('declaration').checked) {
                alert("Please confirm that all information is correct by checking the declaration box.");
                return;
            }
            
            // Get current user
            const user = auth.currentUser;
            if (!user) {
                alert("You must be logged in to submit an application.");
                return;
            }

            // Disable submit button and show loading
            submitBtn.classList.add('loading');
            submitBtn.disabled = true;
            
            try {
                // Collect all form data
                const formData = {
                    userId: user.uid,
                    userEmail: user.email,
                    fullName: document.getElementById('fullName').value,
                    icNumber: document.getElementById('icNumber').value,
                    studentId: document.getElementById('studentId').value,
                    course: document.getElementById('course').value,
                    gender: document.getElementById('gender').value,
                    race: document.getElementById('race').value,
                    religion: document.getElementById('religion').value,
                    phone: document.getElementById('phone').value,
                    homePhone: document.getElementById('homePhone').value || '',
                    email: document.getElementById('email').value,
                    address: document.getElementById('address').value,
                    declarationDate: document.getElementById('declarationDate').value,
                    declarationPlace: document.getElementById('declarationPlace').value,
                    status: 'pending', // pending, approved, rejected
                    submittedAt: serverTimestamp(),
                    applicationType: 'room'
                };
                
                // Save to Firestore
                const docRef = await addDoc(collection(db, "applications"), formData);
                
                // Show success message
                alert("✅ Room Application Submitted Successfully!\n\n" +
                      "📋 Application ID: " + docRef.id + "\n" +
                      "👤 Name: " + formData.fullName + "\n" +
                      "🆔 Student ID: " + formData.studentId + "\n" +
                      "📧 Email: " + formData.email + "\n" +
                      "📞 Phone: " + formData.phone + "\n" +
                      "📅 Date: " + formData.declarationDate + "\n\n" +
                      "Thank you for applying. Your application has been received and will be processed within 3-5 working days.");
                
                // Optional: Reset form
                e.target.reset();
                document.getElementById('declarationDate').value = new Date().toISOString().split('T')[0];
                
                // Redirect to dashboard after 2 seconds
                setTimeout(() => {
                    window.location.href = "student-dashboard.html";
                }, 2000);
                
            } catch (error) {
                console.error("Error saving application:", error);
                alert("Failed to submit application: " + error.message);
            } finally {
                // Re-enable submit button
                submitBtn.classList.remove('loading');
                submitBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
