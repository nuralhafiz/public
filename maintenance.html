        /* Logo Branding */
        
        
        
        

        
        
        
        
        
        
        
        .brand-container {

        /* Avatar in Header */
                /* Premium Student Avatar */

        .avatar-container i {

            z-index: 2;
        }
        
        .container { 
            display: flex; 
            flex: 1; 
            overflow: hidden; 
            position: relative; 
        }
        
        /* Sidebar Styling */
        nav { 
            width: 280px; 
            background: rgba(255, 255, 255, 0.95);

        }

        .nav-item {

        .nav-item:hover {

        }
        .logout-btn:hover {

        main { 
            flex: 1; 
            display: flex; 
            flex-direction: column;

        }

            flex: 1;

        h2:after {

<body>
    <header>
        <div style="display: flex; align-items: center;">
            <i class="fas fa-bars menu-toggle" id="hamburger"></i>
            <div class="brand-container" onclick="window.location.href='student-dashboard.html'">
            <span class="brand-blue">GM<span class="i-wrapper">I<span class="brand-dot"></span></span></span><span class="brand-lime">HostelKu.</span>
        </div>
        </div>
        <div style="display: flex; align-items: center; gap: 10px;">

    <!-- Overlay for mobile menu -->
    <div class="menu-overlay" id="menuOverlay"></div>

    <div class="container">
        <nav id="sidebar">
            <!-- Navigation Menu - My Profile at the top -->
            <div class="nav-menu">
                <a href="student-profile.html" class="nav-item" title="Navigation Link"><i class="fas fa-user"></i> My Profile</a>
                <a href="student-dashboard.html" class="nav-item" title="Navigation Link"><i class="fas fa-home"></i> Dashboard</a>
                <a href="room-apply.html" class="nav-item" title="Navigation Link"><i class="fas fa-check-circle"></i> Room Apply</a>
                <a href="move-out.html" class="nav-item" title="Navigation Link"><i class="fas fa-box-open"></i> Move-Out</a>

            </div>

            <!-- Logout Button at Bottom -->
            <a href="#" class="nav-item logout-btn" id="logoutBtn" aria-label="Logout">

        </nav>
        
        <main id="mainContent">
            <div class="form-container">

                        <i class="fas fa-tools"></i>

                        <div class="form-group">

                            </label>
                            <div style="display: flex; gap: 10px; flex-wrap: wrap; margin-top: 10px;">
                                <span class="priority-badge priority-high" onclick="setPriority('high')" style="cursor: pointer;">?? High</span>
                                <span class="priority-badge priority-medium" onclick="setPriority('medium')" style="cursor: pointer;">?? Medium</span>
                                <span class="priority-badge priority-low" onclick="setPriority('low')" style="cursor: pointer;">?? Low</span>

                        <div class="form-group">

                                <i class="fas fa-camera"></i>

                                <i class="fas fa-cloud-upload-alt"></i>

    <script type="module">
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        
        import { auth, db } from "./js/firebase-config.js";

        const hamburger = document.getElementById('hamburger');
        const sidebar = document.getElementById('sidebar');
        const mainContent = document.getElementById('mainContent');
        const menuOverlay = document.getElementById('menuOverlay');
        const submitBtn = document.getElementById('submitBtn');

        // Function to close sidebar
        function closeSidebar() {
            sidebar.classList.remove('open');
            menuOverlay.classList.remove('active');
        }

        // Function to open sidebar
        function openSidebar() {
            sidebar.classList.add('open');
            menuOverlay.classList.add('active');
        }

        // Toggle sidebar on hamburger click
        hamburger.addEventListener('click', (e) => {
            e.stopPropagation();
            e.preventDefault();
            if (sidebar.classList.contains('open')) {
                closeSidebar();
            } else {
                openSidebar();
            }
        });

        // Close sidebar when clicking on overlay
        menuOverlay.addEventListener('click', () => {
            closeSidebar();
        });

        // Close sidebar when clicking on main content (mobile only)
        mainContent.addEventListener('click', () => {
            if (window.innerWidth <= 768 && sidebar.classList.contains('open')) {
                closeSidebar();
            }
        });

        // Handle window resize
        window.addEventListener('resize', () => {
            if (window.innerWidth > 768) {
                sidebar.classList.remove('open');
                menuOverlay.classList.remove('active');
            }
        });

        // Check if user is logged in
        onAuthStateChanged(auth, (user) => {
            if (user) {
                const email = user.email ? user.email.toLowerCase() : '';
                const isStudent = email.endsWith('@student.gmi.edu.my');
                
                if (!isStudent) {
                    alert('🛡️ Access Denied: Warden accounts cannot access Student pages.');
                    window.location.href = 'warden-dashboard.html';
                    return;
                }
                // RBAC PASS
            }
            if (user) { 
                // Store user info in session storage
                sessionStorage.setItem('userEmail', user.email);
                sessionStorage.setItem('userName', user.email.split('@')[0]);
            } else { 
                window.location.href = "student-login.html"; 
            } 
        });

        // Logout button functionality
        document.getElementById('logoutBtn').addEventListener('click', (e) => { 
            e.preventDefault(); 
            signOut(auth).then(() => {
                sessionStorage.clear();
                window.location.href = "index.html"; 
            }).catch((error) => {
                alert("Logout failed: " + error.message);
            });
        });

        // File upload click handler
        document.getElementById('fileUpload').addEventListener('click', function() {
            document.getElementById('photo').click();
        });

        document.getElementById('photo').addEventListener('change', function(e) {
            if (this.files && this.files[0]) {
                const fileName = this.files[0].name;
                document.querySelector('.file-upload p').innerHTML = `<i class="fas fa-check-circle" style="color: #4caf50;"></i> ${fileName}`;
            }
        });

        // Set priority function
        window.setPriority = function(level) {
            document.getElementById('priority').value = level;
            
            // Update visual indicator
            document.querySelectorAll('.priority-badge').forEach(badge => {
                badge.style.opacity = '0.5';
                badge.style.transform = 'scale(0.95)';
            });
            
            event.target.style.opacity = '1';
            event.target.style.transform = 'scale(1.05)';
        };

        // Set default priority indicator
        setTimeout(() => {
            document.querySelector('.priority-medium').style.opacity = '1';
            document.querySelector('.priority-medium').style.transform = 'scale(1.05)';
        }, 100);

                // Image compression helper
        async function compressImage(file, maxWidth = 800, maxHeight = 800) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = event => {
                    const img = new Image();
                    img.src = event.target.result;
                    img.onload = () => {
                        let width = img.width;
                        let height = img.height;
                        
                        if (width > height) {
                            if (width > maxWidth) {
                                height *= maxWidth / width;
                                width = maxWidth;
                            }
                        } else {
                            if (height > maxHeight) {
                                width *= maxHeight / height;
                                height = maxHeight;
                            }
                        }
                        
                        const canvas = document.createElement('canvas');
                        canvas.width = width;
                        canvas.height = height;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, width, height);
                        
                        const dataUrl = canvas.toDataURL('image/jpeg', 0.7);
                        resolve(dataUrl);
                    };
                    img.onerror = error => reject(error);
                };
                reader.onerror = error => reject(error);
            });
        }

        // Handle form submission with Firestore
        document.getElementById('maintenanceForm').addEventListener('submit', async (e) => { 
            e.preventDefault(); 
            
            // Get current user
            const user = auth.currentUser;
            if (!user) {
                Swal.fire({ heightAuto: false,
                    icon: 'error',
                    title: 'Authentication Error',
                    text: 'You must be logged in to submit a maintenance report.',
                    confirmButtonColor: '#2d72d2'
                });
                return;
            }

            // Get form values
            const category = document.getElementById('category').value;
            const description = document.getElementById('description').value;
            const room = document.getElementById('room').value;
            const priority = document.getElementById('priority').value;
            const preferredTime = document.getElementById('preferredTime').value;
            const photo = document.getElementById('photo').files[0];
            
            // Simple validation
            if (!category || !description || !room) {
                Swal.fire({ heightAuto: false,
                    icon: 'warning',
                    title: 'Missing Information',
                    text: 'Please fill in all required fields (Category, Description, Room Number).',
                    confirmButtonColor: '#2d72d2'
                });
                return;
            }
            
            // Disable submit button and show loading
            submitBtn.classList.add('loading');
            submitBtn.disabled = true;

            try {
                                let photoData = null;
                if (photo) {
                    try {
                        submitBtn.querySelector('span').textContent = 'Compressing Image...';
                        photoData = await compressImage(photo);
                    } catch (e) {
                        console.error('Error compressing image:', e);
                    }
                }

                submitBtn.querySelector('span').textContent = 'Submitting...';

                // Prepare data for Firestore
                const formData = {
                    userId: user.uid,
                    userEmail: user.email,
                    category: category,
                    description: description,
                    room: room,
                    priority: priority,
                    preferredTime: preferredTime || '',
                    photoName: photo ? photo.name : null,
                    photoData: photoData,
                    status: 'pending', // pending, in-progress, completed
                    requestType: 'maintenance',
                    submittedAt: serverTimestamp()
                };

                // Save to Firestore
                const docRef = await addDoc(collection(db, "maintenance_requests"), formData);

                // Format date for display
                let formattedTime = "Not specified";
                if (preferredTime) {
                    const date = new Date(preferredTime);
                    formattedTime = date.toLocaleString('en-MY', {
                        year: 'numeric',
                        month: 'long',
                        day: 'numeric',
                        hour: '2-digit',
                        minute: '2-digit'
                    });
                }
                
                // Show success message
                Swal.fire({ heightAuto: false,
                    icon: 'success',
                    title: 'Report Submitted!',
                    html: `
                        <div style="text-align: left; padding: 10px;">
                            <p><b>Ticket ID:</b> ${docRef.id}</p>
                            <p><b>Room:</b> ${formData.room}</p>
                            <p><b>Category:</b> ${formData.category}</p>
                            <p><b>Priority:</b> <span class="priority-badge priority-${formData.priority}">${formData.priority}</span></p>
                        </div>
                        <p style="margin-top:15px; font-size:14px;">Maintenance team will respond within 24 hours.</p>
                    `,
                    confirmButtonColor: '#2d72d2',
                    confirmButtonText: 'Go to Dashboard'
                }).then(() => {
                    window.location.href = "student-dashboard.html";
                });
                
                // Reset form
                e.target.reset();
                document.querySelector('.file-upload p').innerHTML = 'Click to upload or drag and drop';
                document.querySelectorAll('.priority-badge').forEach(badge => {
                    badge.style.opacity = '0.5';
                    badge.style.transform = 'scale(0.95)';
                });
                document.querySelector('.priority-medium').style.opacity = '1';
                document.querySelector('.priority-medium').style.transform = 'scale(1.05)';
                document.getElementById('priority').value = 'medium';
                
            } catch (error) {
                console.error("Error saving report:", error);
                Swal.fire({ heightAuto: false,
                    icon: 'error',
                    title: 'Submission Failed',
                    text: error.message,
                    confirmButtonColor: '#f44336'
                });
            } finally {
                // Re-enable submit button
                submitBtn.classList.remove('loading');
                submitBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
