<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GMI HostelKu - Student Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="css/global.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body { 
            font-family: 'Poppins', sans-serif; 
            margin: 0; 
            display: flex; 
            flex-direction: column; 
            height: 100vh; 
            background: #f0f3fa;
            overflow: hidden; 
        }
        
        /* Header Styling */
        header { background: linear-gradient(135deg, #1e3a8a 0%, #2d72d2 100%);
            backdrop-filter: blur(10px);
            color: white; 
            padding: 0 25px; 
            display: flex; 
            align-items: center; 
            justify-content: space-between; 
            z-index: 1000; 
            flex-shrink: 0; 
            height: 70px;
            box-shadow: 0 2px 20px rgba(0,0,0,0.1);
        }

        /* Logo Branding */
        
        
        
        
        
        
        
        
        
        
        
        
        .brand-container { 
            display: flex; 
            align-items: center; 
            font-size: 24px; 
            font-weight: 800; 
            cursor: pointer; 
            position: relative; 
            margin-left: 10px;
            letter-spacing: -0.5px;
        }
        
        
        
        
        .menu-toggle { 
            cursor: pointer; 
            font-size: 22px; 
            color: white; 
            margin-right: 15px;
            transition: transform 0.3s;
        }
        .menu-toggle:hover {
            transform: scale(1.1);
        }

        /* Avatar in Header */
                /* Premium Student Avatar */
                /* Premium Student Avatar */
        .avatar-container {
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            align-items: center;
            justify-content: center;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: linear-gradient(135deg, #ccff00 0%, #99cc00 100%);
            border: 2px solid rgba(255, 255, 255, 0.9);
            position: relative;
            overflow: hidden;
        }
        .avatar-container::after {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.4) 0%, transparent 60%);
        }
        .avatar-container:hover {
            transform: scale(1.1) translateY(-2px);
            border-color: #ffffff;
        }
        .avatar-container i {
            font-size: 22px;
            color: #0f1638;
            z-index: 2;
        }

        /* Layout */
        .container { 
            display: flex; 
            flex: 1; 
            overflow: hidden; 
            position: relative; 
        }
        
        /* Sidebar Styling */
        nav { 
            width: 280px; 
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-right: 1px solid rgba(255,255,255,0.2); 
            padding: 25px 0;
            display: flex; 
            flex-direction: column; 
            transition: transform 0.3s ease; 
            z-index: 900; 
            overflow-y: auto;
            box-shadow: 5px 0 25px rgba(0,0,0,0.1);
        }

        .nav-menu {
            padding: 0 20px;
            flex: 1;
        }

        .nav-item { 
            display: flex; 
            align-items: center; 
            padding: 14px 20px; 
            margin-bottom: 8px; 
            text-decoration: none; 
            color: #333; 
            border-radius: 12px; 
            font-size: 15px; 
            font-weight: 500;
            transition: all 0.3s; 
            cursor: pointer; 
        }
        .nav-item:hover { 
            background: linear-gradient(135deg, #1e3a8a 0%, #2d72d2 100%);
            color: white; 
            transform: translateX(5px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }
        .nav-item.active { 
            background: linear-gradient(135deg, #1e3a8a 0%, #2d72d2 100%);
            color: white; 
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }
        .nav-item i { 
            margin-right: 12px; 
            font-size: 20px; 
            width: 24px; 
            text-align: center; 
        }
        
        .logout-btn { 
            margin: 20px 20px 15px 20px;
            color: #f44336; 
            border: 2px solid #f44336;
            background: transparent;
        }
        .logout-btn:hover { 
            background: #f44336; 
            color: white; 
            border-color: #f44336;
            transform: translateX(5px);
        }
        
        main { 
            flex: 1; 
            padding: 30px; 
            display: flex; 
            gap: 25px; 
            flex-wrap: wrap; 
            overflow-y: auto; 
            background: #f0f3fa;
        }

        /* Dashboard Cards */
        .card-section { 
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 20px; 
            padding: 25px; 
            flex: 1; 
            min-width: 320px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.2); 
            height: fit-content;
            animation: slideUp 0.5s ease;
            transition: transform 0.3s;
        }

        .card-section:hover {
            transform: translateY(-5px);
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        h2 { 
            border-bottom: 3px solid transparent;
            border-image: linear-gradient(135deg, #1e3a8a 0%, #2d72d2 100%);
            border-image-slice: 1;
            padding-bottom: 15px; 
            margin-top: 0; 
            margin-bottom: 20px;
            font-size: 20px; 
            font-weight: 600;
            color: #0f1638;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        h2 i {
            color: #2d72d2;
            font-size: 24px;
        }
        
        .alert-item { 
            background: rgba(248, 249, 250, 0.8);
            backdrop-filter: blur(5px);
            min-height: 60px; 
            margin-bottom: 15px; 
            border-radius: 12px; 
            display: flex; 
            align-items: center; 
            padding: 15px 20px; 
            border-left: 4px solid; 
            font-size: 14px; 
            color: #333;
            transition: all 0.3s;
            cursor: pointer;
        }

        .alert-item:hover {
            transform: translateX(5px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.2);
            background: white;
        }

        .alert-item i { 
            margin-right: 15px; 
            font-size: 18px;
        }

        .alert-item.info {
            border-left-color: #2196F3;
        }
        .alert-item.warning {
            border-left-color: #ff9800;
        }
        .alert-item.success {
            border-left-color: #4caf50;
        }
        .alert-item.danger {
            border-left-color: #f44336;
        }

        .alert-item.info i { color: #2196F3; }
        .alert-item.warning i { color: #ff9800; }
        .alert-item.success i { color: #4caf50; }
        .alert-item.danger i { color: #f44336; }

        /* Quick Action Buttons */
        .quick-actions {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
        }

        .action-btn {
            background: linear-gradient(135deg, #1e3a8a 0%, #2d72d2 100%);
            color: white;
            padding: 15px 20px;
            border: none;
            border-radius: 12px;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            text-decoration: none;
            text-align: center;
        }

        .action-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
        }

        .action-btn i {
            font-size: 18px;
        }

        /* Recent Activity */
        .activity-item {
            display: flex;
            align-items: flex-start;
            gap: 15px;
            padding: 15px 0;
            border-bottom: 1px solid rgba(0,0,0,0.05);
        }

        .activity-item:last-child {
            border-bottom: none;
        }

        .activity-icon {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
        }

        .activity-icon.success {
            background: rgba(76, 175, 80, 0.1);
            color: #4caf50;
        }
        .activity-icon.warning {
            background: rgba(255, 152, 0, 0.1);
            color: #ff9800;
        }
        .activity-icon.info {
            background: rgba(33, 150, 243, 0.1);
            color: #2196F3;
        }
        .activity-icon.danger {
            background: rgba(244, 67, 54, 0.1);
            color: #f44336;
        }

        .activity-content {
            flex: 1;
        }

        .activity-title {
            font-weight: 600;
            color: #333;
            margin-bottom: 5px;
        }

        .activity-time {
            font-size: 12px;
            color: #999;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        /* Mobile Responsive */
        @media (max-width: 1024px) {
            nav { 
                position: absolute; 
                left: 0; 
                top: 0; 
                bottom: 0; 
                transform: translateX(-100%); 
                box-shadow: 5px 0 25px rgba(0,0,0,0.2);
                width: 280px;
            }
            nav.open { 
                transform: translateX(0); 
            }
            
            .menu-overlay {
                display: none;
                position: fixed;
                top: 0;
                left: 0;
                right: 0;
                bottom: 0;
                background: rgba(0,0,0,0.5);
                z-index: 800;
                backdrop-filter: blur(3px);
            }
            .menu-overlay.active {
                display: block;
            }

            main {
                padding: 20px;
            }

            .card-section {
                min-width: 100%;
            }

            .quick-actions {
                grid-template-columns: 1fr;
            }
        }
    </style>

    
</head>
<body>

<header>
    <div style="display: flex; align-items: center;">
        <i class="fas fa-bars menu-toggle" id="hamburger"></i>
        <div class="brand-container" onclick="window.location.href='student-dashboard.html'">
            <span class="brand-blue">GM<span class="i-wrapper">I<span class="brand-dot"></span></span></span><span class="brand-lime">HostelKu.</span>
        </div>
    </div>
    <div style="display: flex; align-items: center; gap: 10px;">
        <!-- Avatar Icon that links to profile page -->
        <a href="student-profile.html" class="avatar-container" id="profileLink" aria-label="User Profile">
            <i class="fas fa-user-graduate"></i>
        </a>
    </div>
</header>

<!-- Overlay for mobile menu -->
<div class="menu-overlay" id="menuOverlay"></div>

<div class="container">
    <nav id="sidebar">
        <!-- Navigation Menu - My Profile at the top -->
        <div class="nav-menu">
            <a href="student-profile.html" class="nav-item" title="Navigation Link"><i class="fas fa-user"></i> My Profile</a>
            <a href="student-dashboard.html" class="nav-item active" title="Navigation Link"><i class="fas fa-home"></i> Dashboard</a>
            <a href="room-apply.html" class="nav-item" title="Navigation Link"><i class="fas fa-check-circle"></i> Room Apply</a>
            <a href="move-out.html" class="nav-item" title="Navigation Link"><i class="fas fa-box-open"></i> Move-Out</a>
            <a href="maintenance.html" class="nav-item" title="Navigation Link"><i class="fas fa-tools"></i> Room Maintenance</a>
        </div>

        <!-- Logout Button at Bottom -->
        <a href="#" class="nav-item logout-btn" id="logoutBtn" aria-label="Logout">
            <i class="fas fa-sign-out-alt"></i> Logout
        </a>
    </nav>

    <main id="mainContent">
        <!-- Section 1: Alerts & Reminders -->
        <section class="card-section">
            <h2>
                <i class="fas fa-bell"></i>
                Alerts & Reminders
            </h2>
            <div class="alert-item info" style="justify-content: center; opacity: 0.7; padding: 25px;">
                <i class="fas fa-check-circle" style="color: #4caf50;"></i>
                <div>
                    <strong>You're all caught up!</strong> No new alerts at this moment.
                </div>
            </div>
        </section>

        <!-- Section 2: Quick Actions -->
        <section class="card-section">
            <h2>
                <i class="fas fa-rocket"></i>
                Quick Actions
            </h2>
            <div class="quick-actions">
                <a href="room-apply.html" class="action-btn" title="Navigation Link">
                    <i class="fas fa-bed"></i> Apply for Room
                </a>
                <a href="maintenance.html" class="action-btn" title="Navigation Link">
                    <i class="fas fa-tools"></i> Report Issue
                </a>
                <a href="move-out.html" class="action-btn" title="Navigation Link">
                    <i class="fas fa-box-open"></i> Move-Out
                </a>
                <a href="student-profile.html" class="action-btn" title="Navigation Link">
                    <i class="fas fa-user"></i> View Profile
                </a>
            </div>
        </section>

        <!-- Section 3: Recent Activity -->
        <section class="card-section">
            <h2>
                <i class="fas fa-history"></i>
                Recent Activity
            </h2>
            <div id="activityContainer">
                <div style="text-align: center; padding: 30px; color: #666;">
                    <i class="fas fa-spinner fa-spin"></i> Loading recent activity...
                </div>
            </div>
        </section>
    </main>
</div>

<script type="module">
    import { getAuth, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    import { auth, db } from "./js/firebase-config.js";
    import { collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const hamburger = document.getElementById('hamburger');
    const sidebar = document.getElementById('sidebar');
    const mainContent = document.getElementById('mainContent');
    const menuOverlay = document.getElementById('menuOverlay');

    // Function to close sidebar
    function closeSidebar() {
        sidebar.classList.remove('open');
        menuOverlay.classList.remove('active');
    }

    // Function to open sidebar
    function openSidebar() {
        sidebar.classList.add('open');
        menuOverlay.classList.add('active');
    }

    // Toggle sidebar on hamburger click
    hamburger.addEventListener('click', (e) => {
        e.stopPropagation();
        e.preventDefault();
        if (sidebar.classList.contains('open')) {
            closeSidebar();
        } else {
            openSidebar();
        }
    });

    // Close sidebar when clicking on overlay
    menuOverlay.addEventListener('click', () => {
        closeSidebar();
    });

    // Close sidebar when clicking on main content (mobile only)
    mainContent.addEventListener('click', () => {
        if (window.innerWidth <= 768 && sidebar.classList.contains('open')) {
            closeSidebar();
        }
    });

    // Handle window resize
    
    async function loadRecentActivity(email) {
        const activityContainer = document.getElementById('activityContainer');
        let activities = [];

        try {
            // Fetch Applications
            const appQuery = query(collection(db, "applications"), where("userEmail", "==", email));
            const appSnap = await getDocs(appQuery);
            appSnap.forEach(doc => {
                const data = doc.data();
                activities.push({
                    title: "Room application submitted",
                    time: data.timestamp ? data.timestamp.toDate() : new Date(),
                    icon: "fa-bed",
                    type: "info"
                });
            });

            // Fetch Maintenance
            const maintQuery = query(collection(db, "maintenance_requests"), where("userEmail", "==", email));
            const maintSnap = await getDocs(maintQuery);
            maintSnap.forEach(doc => {
                const data = doc.data();
                activities.push({
                    id: doc.id,
                    type_id: "maintenance",
                    title: "Maintenance request: " + (data.category || data.issueType || 'General'),
                    time: data.submittedAt ? data.submittedAt.toDate() : (data.timestamp ? data.timestamp.toDate() : new Date()),
                    icon: data.status === 'completed' ? "fa-check-circle" : "fa-tools",
                    type: data.status === 'completed' ? "success" : "warning",
                    rawData: data
                });
            });

            // Fetch Move-Out
            const moveOutQuery = query(collection(db, "moveout_requests"), where("userEmail", "==", email));
            const moveOutSnap = await getDocs(moveOutQuery);
            moveOutSnap.forEach(doc => {
                const data = doc.data();
                activities.push({
                    title: "Move-out request submitted",
                    time: data.timestamp ? data.timestamp.toDate() : new Date(),
                    icon: "fa-box-open",
                    type: "danger"
                });
            });

            // Sort descending
            activities.sort((a, b) => b.time - a.time);

            // Render
            if (activities.length === 0) {
                activityContainer.innerHTML = `<div style="text-align: center; padding: 30px; color: #666;">
                    No recent activity found.
                </div>`;
                return;
            }

            let html = '';
            // Show only latest 5
            const latestActivities = activities.slice(0, 5);
            
            latestActivities.forEach((item, index) => {
                // Exact Date Time formatter
                const timeOptions = { day: 'numeric', month: 'short', year: 'numeric', hour: 'numeric', minute: '2-digit', hour12: true };
                let timeString = item.time.toLocaleString('en-MY', timeOptions);

                html += `
                <div class="activity-item" data-index="${index}">
                    <div class="activity-icon ${item.type}">
                        <i class="fas ${item.icon}"></i>
                    </div>
                    <div class="activity-content">
                        <div class="activity-title">${item.title}</div>
                        <div class="activity-time">
                            <i class="fas fa-clock"></i> ${timeString}
                        </div>
                    </div>
                </div>`;
            });

            activityContainer.innerHTML = html;
            window.latestActivitiesData = latestActivities;

        } catch (error) {
            console.error("Error fetching activities:", error);
            activityContainer.innerHTML = `<div style="text-align: center; padding: 30px; color: #f44336;">
                    Failed to load activities.
                </div>`;
        }
    }
    

    window.addEventListener('resize', () => {
        if (window.innerWidth > 768) {
            // On desktop, ensure sidebar is visible and overlay is hidden
            sidebar.classList.remove('open');
            menuOverlay.classList.remove('active');
        }
    });

    // Check if user is logged in
    onAuthStateChanged(auth, (user) => {
            if (user) {
                const email = user.email ? user.email.toLowerCase() : '';
                const isStudent = email.endsWith('@student.gmi.edu.my');
                
                if (!isStudent) {
                    Swal.fire({ heightAuto: false,
                        icon: 'error',
                        title: 'Access Denied',
                        text: 'Warden accounts cannot access Student pages.',
                        confirmButtonColor: '#d33'
                    }).then(() => {
                        window.location.href = 'warden-dashboard.html';
                    });
                    return;
                }
                // RBAC PASS
            }
            if (user) {
            // Load activities dynamically
            loadRecentActivity(user.email);
            
            // Store user email in session storage for profile page to use
            sessionStorage.setItem('userEmail', user.email);
            sessionStorage.setItem('userName', user.email.split('@')[0]);
        } else {
            // No user logged in, redirect to login page
            window.location.href = "student-login.html";
        }
    });

    // Logout button functionality
    document.getElementById('logoutBtn').addEventListener('click', (e) => {
        e.preventDefault();
        signOut(auth).then(() => {
            // Clear session storage
            sessionStorage.clear();
            // Sign-out successful, redirect to index page
            window.location.href = "index.html";
        }).catch((error) => {
            // An error happened
            Swal.fire('Error', 'Logout failed: ' + error.message, 'error');
        });
    });

    // Use event delegation for alert items and dynamically added activity items
    document.body.addEventListener('click', function(e) {
        // Handle alert clicks
        const alertItem = e.target.closest('.alert-item');
        if (alertItem) {
            const title = alertItem.querySelector('strong')?.textContent || 'Alert';
            Swal.fire({ heightAuto: false,
                icon: 'info',
                title: 'Announcement Details',
                html: `<strong>${title}</strong><br><br><p style="color: #666; font-size: 14px;">This is a system generated announcement. You are all caught up and no further action is required at this time.</p>`,
                confirmButtonColor: '#2d72d2',
                confirmButtonText: 'Understood'
            });
            return;
        }

        // Handle activity clicks
        const activityItem = e.target.closest('.activity-item');
        if (activityItem) {
            const index = activityItem.getAttribute('data-index');
            const itemData = window.latestActivitiesData ? window.latestActivitiesData[index] : null;
            
            const title = activityItem.querySelector('.activity-title')?.textContent || 'Activity';
            const time = activityItem.querySelector('.activity-time')?.textContent || '';
            const typeClass = activityItem.querySelector('.activity-icon').className;
            
            let iconType = 'info';
            if(typeClass.includes('success')) iconType = 'success';
            if(typeClass.includes('warning')) iconType = 'warning';
            // Use info icon for danger type instead of error X
            if(typeClass.includes('danger')) iconType = 'info';

            let extraHtml = '';
            let popupWidth = '32em';
            if (itemData && itemData.type_id === 'maintenance' && itemData.rawData) {
                const req = itemData.rawData;
                extraHtml += `<hr style="margin: 15px 0; border: 0; border-top: 1px solid #ddd;">
                              <p style="margin-bottom: 5px;"><strong>Status:</strong> <span style="text-transform: uppercase; font-weight: 600; color: ${req.status === 'completed' ? '#4caf50' : '#ff9800'};">${(req.status || 'pending').replace('-', ' ')}</span></p>
                              <p style="margin-bottom: 5px;"><strong>Description:</strong> ${req.description || 'N/A'}</p>`;
                
                if (req.completionPhotoData) {
                    extraHtml += `<div style="margin-top:15px; border-top: 1px solid #e0e0e0; padding-top: 15px;"><p style="margin-bottom: 10px; color: #4caf50;"><strong><i class="fas fa-check-circle"></i> Completion Proof Photo:</strong></p><img src="${req.completionPhotoData}" style="max-width: 100%; border-radius: 8px; border: 1px solid #4caf50; cursor: pointer;" onclick="window.open(this.src, '_blank')" /></div>`;
                    popupWidth = '500px';
                }
            }

            Swal.fire({ heightAuto: false,
                icon: iconType,
                title: 'Activity Record',
                width: popupWidth,
                html: `<div style="text-align: left; background: #f8f9fa; padding: 15px; border-radius: 8px;">
                        <strong>Action:</strong> ${title}<br>
                        <strong>Timestamp:</strong> ${time}<br>
                        ${extraHtml ? extraHtml : `<br><p style="color: #666; font-size: 13px; margin: 0;">Record tracking active. If you need to follow up on this request, please refer to the respective department.</p>`}
                       </div>`,
                confirmButtonColor: '#2d72d2'
            });
        }
    });
</script>

</body>
</html>
