<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GMI HostelKu - Manage Applications</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Poppins', sans-serif; display: flex; flex-direction: column; height: 100vh; background: #f0f3fa; overflow: hidden; }
        
        /* Header Styling - Updated to match warden dashboard */
        header { background: linear-gradient(135deg, #1e3a8a 0%, #2d72d2 100%); backdrop-filter: blur(10px); color: white; padding: 0 25px; display: flex; align-items: center; justify-content: space-between; z-index: 1000; flex-shrink: 0; height: 70px; box-shadow: 0 2px 20px rgba(0,0,0,0.1); }

        
        
        
        

        
        
        
        
        
        
        
        .brand-container { 
            display: flex; 
            align-items: center; 
            font-size: 24px; 
            font-weight: 800; 
            cursor: pointer; 
            position: relative; 
            margin-left: 10px;
            letter-spacing: -0.5px;
        }
        
        
        
        
        .menu-toggle { cursor: pointer; font-size: 22px; color: white; margin-right: 15px; transition: transform 0.3s; }
        .menu-toggle:hover { transform: scale(1.1); }

        /* Avatar in Header - Matching warden dashboard */
                /* Premium Warden Avatar */
                /* Premium Warden Avatar */
        .avatar-container {
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            align-items: center;
            justify-content: center;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: linear-gradient(135deg, #ff3131 0%, #cc0000 100%);
            border: 2px solid rgba(255, 255, 255, 0.9);
            position: relative;
            overflow: hidden;
        }
        .avatar-container::after {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.4) 0%, transparent 60%);
        }
        .avatar-container:hover {
            transform: scale(1.1) translateY(-2px);
            border-color: #ffffff;
        }
        .avatar-container i {
            font-size: 22px;
            color: #ffffff;
            z-index: 2;
        }

        .container { display: flex; flex: 1; overflow: hidden; position: relative; }
        
        /* Sidebar - Updated to blue */
        nav { width: 280px; background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); border-right: 1px solid rgba(255,255,255,0.2); padding: 25px 0; display: flex; flex-direction: column; transition: transform 0.3s ease; z-index: 900; overflow-y: auto; box-shadow: 5px 0 25px rgba(0,0,0,0.1); }

        .nav-menu { padding: 0 20px; flex: 1; }
        .nav-item { display: flex; align-items: center; padding: 14px 20px; margin-bottom: 8px; text-decoration: none; color: #333; border-radius: 12px; font-size: 15px; font-weight: 500; transition: all 0.3s; }
        .nav-item:hover { background: linear-gradient(135deg, #1e3a8a 0%, #2d72d2 100%); color: white; transform: translateX(5px); box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4); }
        .nav-item.active { background: linear-gradient(135deg, #1e3a8a 0%, #2d72d2 100%); color: white; box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4); }
        .nav-item i { margin-right: 12px; font-size: 20px; width: 24px; text-align: center; }
        
        .logout-btn { margin: 20px 20px 15px 20px; color: #f44336; border: 2px solid #f44336; background: transparent; }
        .logout-btn:hover { background: #f44336; color: white; border-color: #f44336; transform: translateX(5px); }
        
        main { flex: 1; padding: 30px; overflow-y: auto; background: #f0f3fa; }

        /* Page Header */
        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(10px);
            padding: 20px 25px;
            border-radius: 15px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
        }

        .page-header h2 {
            font-size: 24px;
            color: #0f1638;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .page-header h2 i {
            color: #2d72d2;
        }

        .stats-badge {
            display: flex;
            gap: 15px;
        }

        .stat-badge-item {
            background: linear-gradient(135deg, #1e3a8a 0%, #2d72d2 100%);
            color: white;
            padding: 8px 15px;
            border-radius: 50px;
            font-size: 13px;
            font-weight: 500;
        }

        /* Loading Spinner */
        .loading-spinner {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 50px;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid rgba(102, 126, 234, 0.2);
            border-radius: 50%;
            border-top-color: #2d72d2;
            animation: spin 1s ease-in-out infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Filters */
        .filters-section {
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(10px);
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 25px;
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            align-items: center;
        }

        .search-box {
            flex: 1;
            min-width: 250px;
            position: relative;
        }

        .search-box i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #999;
        }

        .search-box input {
            width: 100%;
            padding: 12px 15px 12px 45px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-family: 'Poppins', sans-serif;
            font-size: 14px;
            transition: all 0.3s;
        }

        .search-box input:focus {
            border-color: #2d72d2;
            outline: none;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .filter-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .filter-select {
            padding: 10px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-family: 'Poppins', sans-serif;
            font-size: 14px;
            background: white;
            cursor: pointer;
            min-width: 150px;
        }

        .filter-select:focus {
            border-color: #2d72d2;
            outline: none;
        }

        /* Refresh Button */
        .refresh-btn {
            background: #2d72d2;
            color: white;
            border: none;
            border-radius: 8px;
            padding: 10px 20px;
            font-size: 14px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.3s;
        }

        .refresh-btn:hover {
            background: #764ba2;
            transform: translateY(-2px);
        }

        /* Applications Table */
        .applications-table-container {
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 20px;
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            text-align: left;
            padding: 15px 10px;
            font-size: 13px;
            font-weight: 600;
            color: #666;
            text-transform: uppercase;
            border-bottom: 2px solid #f0f0f0;
        }

        td {
            padding: 15px 10px;
            font-size: 14px;
            color: #333;
            border-bottom: 1px solid #f0f0f0;
        }

        tr:hover td {
            background: rgba(102, 126, 234, 0.05);
        }

        .student-info {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .student-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: linear-gradient(135deg, #1e3a8a 0%, #2d72d2 100%);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
        }

        .student-name {
            font-weight: 600;
            color: #0f1638;
        }

        .student-email {
            font-size: 12px;
            color: #999;
        }

        .room-badge {
            background: #e8f5e9;
            color: #4caf50;
            padding: 5px 10px;
            border-radius: 5px;
            font-size: 12px;
            font-weight: 600;
        }

        .status-badge {
            padding: 5px 12px;
            border-radius: 50px;
            font-size: 12px;
            font-weight: 600;
            display: inline-block;
        }

        .status-pending { background: #fff3e0; color: #ff9800; }
        .status-approved { background: #e8f5e9; color: #4caf50; }
        .status-rejected { background: #ffebee; color: #f44336; }

        .action-buttons {
            display: flex;
            gap: 5px;
        }

        .action-btn {
            padding: 6px 12px;
            border-radius: 5px;
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;
            border: none;
            transition: all 0.3s;
        }

        .action-view { background: #e3f2fd; color: #2196f3; }
        .action-approve { background: #e8f5e9; color: #4caf50; }
        .action-reject { background: #ffebee; color: #f44336; }
        .action-btn:hover { transform: translateY(-2px); box-shadow: 0 3px 8px rgba(0,0,0,0.2); }

        /* Pagination */
        .pagination {
            display: flex;
            justify-content: flex-end;
            gap: 5px;
            margin-top: 20px;
        }

        .page-btn {
            width: 35px;
            height: 35px;
            border-radius: 8px;
            border: 1px solid #e0e0e0;
            background: white;
            cursor: pointer;
            transition: all 0.3s;
        }

        .page-btn.active {
            background: #2d72d2;
            color: white;
            border-color: #2d72d2;
        }

        .page-btn:hover:not(.active) {
            background: #f5f5f5;
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 50px;
            color: #999;
        }

        .empty-state i {
            font-size: 60px;
            margin-bottom: 20px;
            color: #2d72d2;
        }

        @media (max-width: 768px) {
            .page-header { flex-direction: column; align-items: flex-start; gap: 15px; }
            nav { position: absolute; left: 0; top: 0; bottom: 0; transform: translateX(-100%); width: 280px; }
            nav.open { transform: translateX(0); }
            .menu-overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); z-index: 800; backdrop-filter: blur(3px); }
            .menu-overlay.active { display: block; }
            .filters-section { flex-direction: column; }
            .filter-group { width: 100%; }
            .filter-select { width: 100%; }
            .stats-badge { flex-direction: row; flex-wrap: wrap; justify-content: center; gap: 8px; width: 100%; }
            .stat-badge-item { flex: 1 1 auto; justify-content: center; text-align: center; }
        }
    </style>

    <style id="unified-logo-style">

            position: relative;
            display: inline-block;
            line-height: 1;
            padding-right: 0.05em; /* Padding for the wrapper */
        }
        .brand-blue {
            color: #1118a8; /* Deep blue from image */
            font-weight: 900;
            font-family: 'Arial', sans-serif;
            letter-spacing: -1px;
            text-shadow: 
                -0.8px -0.8px 0 #fff, 0px -0.8px 0 #fff, 0.8px -0.8px 0 #fff, 0.8px 0px 0 #fff, 0.8px 0.8px 0 #fff, 0px 0.8px 0 #fff, -0.8px 0.8px 0 #fff, -0.8px 0px 0 #fff, 0 4px 6px rgba(0,0,0,0.3);
        }
        .brand-dot {
            position: absolute;
            top: -0.24em;

        .brand-lime {
            color: #ccff00;
            margin-left: 5px;
            font-family: 'Poppins', sans-serif;
            font-weight: 800;
            text-shadow: 
                -0.8px -0.8px 0 #000, 0px -0.8px 0 #000, 0.8px -0.8px 0 #000, 0.8px 0px 0 #000, 0.8px 0.8px 0 #000, 0px 0.8px 0 #000, -0.8px 0.8px 0 #000, -0.8px 0px 0 #000, 0 4px 6px rgba(0,0,0,0.3);
        }
        /* Increased font size for dashboards */
        .brand-container {
            font-size: 32px !important;
        }
    </style>

    
</head>
<body>
    <header>
        <div style="display: flex; align-items: center;">
            <i class="fas fa-bars menu-toggle" id="hamburger"></i>
            <div class="brand-container" onclick="window.location.href='warden-dashboard.html'">
            <span class="gmi-wrapper"><span class="brand-blue">GMI</span><span class="brand-dot"></span></span><span class="brand-lime">HostelKu.</span>
        </div>
            <!-- Removed warden badge -->
        </div>
        <div style="display: flex; align-items: center; gap: 10px;">
            <!-- Avatar Icon matching warden dashboard -->
            <a href="warden-profile.html" class="avatar-container" id="profileLink">
                <i class="fas fa-user-shield"></i>
            </a>
        </div>
    </header>

    <div class="menu-overlay" id="menuOverlay"></div>

    <div class="container">
        <nav id="sidebar">
            <div class="nav-menu">
                <a href="warden-profile.html" class="nav-item"><i class="fas fa-user"></i> My Profile</a>
                <a href="warden-dashboard.html" class="nav-item"><i class="fas fa-home"></i> Dashboard</a>
                <a href="warden-applications.html" class="nav-item active"><i class="fas fa-file-alt"></i> Applications</a>
                <a href="warden-moveout.html" class="nav-item"><i class="fas fa-box-open"></i> Move-Out</a>
                <a href="warden-maintenance.html" class="nav-item"><i class="fas fa-tools"></i> Maintenance</a>
                <a href="warden-students.html" class="nav-item"><i class="fas fa-users"></i> Students</a>
                <a href="warden-rooms.html" class="nav-item"><i class="fas fa-bed"></i> Rooms</a>
                <a href="warden-reports.html" class="nav-item"><i class="fas fa-chart-bar"></i> Reports</a>
            </div>
            <a href="#" class="nav-item logout-btn" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> Logout</a>
        </nav>

        <main id="mainContent">
            <div class="page-header">
                <h2>
                    <i class="fas fa-file-alt"></i>
                    Room Applications
                </h2>
                <div class="stats-badge" id="stats-badge">
                    <span class="stat-badge-item"><i class="fas fa-clock"></i> Pending: <span id="pendingCount">0</span></span>
                    <span class="stat-badge-item"><i class="fas fa-check-circle"></i> Approved: <span id="approvedCount">0</span></span>
                    <span class="stat-badge-item"><i class="fas fa-times-circle"></i> Rejected: <span id="rejectedCount">0</span></span>
                </div>
            </div>

            <div class="filters-section">
                <div class="search-box">
                    <i class="fas fa-search"></i>
                    <input type="text" id="searchInput" placeholder="Search by name, ID, or room...">
                </div>
                <div class="filter-group">
                    <select class="filter-select" id="statusFilter">
                        <option value="all">All Status</option>
                        <option value="pending">Pending</option>
                        <option value="approved">Approved</option>
                        <option value="rejected">Rejected</option>
                    </select>
                    <button class="refresh-btn" id="refreshBtn">
                        <i class="fas fa-sync-alt"></i> Refresh
                    </button>
                </div>
            </div>

            <div class="applications-table-container">
                <div id="loadingSpinner" class="loading-spinner">
                    <div class="spinner"></div>
                </div>
                <table id="applicationsTable" style="display: none;">
                    <thead>
                        <tr>
                            <th>Student</th>
                            <th>ID</th>
                            <th>Room</th>
                            <th>Type</th>
                            <th>Applied Date</th>
                            <th>Status</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="applicationsTableBody">
                    </tbody>
                </table>
                <div id="emptyState" class="empty-state" style="display: none;">
                    <i class="fas fa-file-alt"></i>
                    <h3>No Applications Found</h3>
                    <p>There are no room applications to display.</p>
                </div>
                <div class="pagination" id="pagination" style="display: none;">
                    <button class="page-btn" id="prevPage"><i class="fas fa-chevron-left"></i></button>
                    <span id="pageNumbers"></span>
                    <button class="page-btn" id="nextPage"><i class="fas fa-chevron-right"></i></button>
                </div>
            </div>
        </main>
    </div>

    <script type="module">
        import { getAuth, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, collection, query, where, orderBy, getDocs, doc, updateDoc, deleteDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        import { auth, db } from "./js/firebase-config.js";

        const hamburger = document.getElementById('hamburger');
        const sidebar = document.getElementById('sidebar');
        const mainContent = document.getElementById('mainContent');
        const menuOverlay = document.getElementById('menuOverlay');

        // UI Elements
        const loadingSpinner = document.getElementById('loadingSpinner');
        const applicationsTable = document.getElementById('applicationsTable');
        const applicationsTableBody = document.getElementById('applicationsTableBody');
        const emptyState = document.getElementById('emptyState');
        const pagination = document.getElementById('pagination');
        const searchInput = document.getElementById('searchInput');
        const statusFilter = document.getElementById('statusFilter');
        const refreshBtn = document.getElementById('refreshBtn');
        const pendingCount = document.getElementById('pendingCount');
        const approvedCount = document.getElementById('approvedCount');
        const rejectedCount = document.getElementById('rejectedCount');

        let applications = [];
        let filteredApplications = [];
        let currentPage = 1;
        const itemsPerPage = 10;

        function closeSidebar() { sidebar.classList.remove('open'); menuOverlay.classList.remove('active'); }
        function openSidebar() { sidebar.classList.add('open'); menuOverlay.classList.add('active'); }

        hamburger.addEventListener('click', (e) => {
            e.preventDefault();
            sidebar.classList.contains('open') ? closeSidebar() : openSidebar();
        });

        menuOverlay.addEventListener('click', closeSidebar);
        mainContent.addEventListener('click', () => { if (window.innerWidth <= 768 && sidebar.classList.contains('open')) closeSidebar(); });
        window.addEventListener('resize', () => { if (window.innerWidth > 768) closeSidebar(); });

        onAuthStateChanged(auth, (user) => {
            if (user) {
                const email = user.email ? user.email.toLowerCase() : '';
                const isStudent = email.endsWith('@student.gmi.edu.my');
                
                if (isStudent) {
                    alert('🛡️ Access Denied: Student accounts cannot access Warden pages.');
                    window.location.href = 'student-dashboard.html';
                    return;
                }
                // RBAC PASS
            }
            if (user) {
                if (!user.email.endsWith('@gmi.edu.my') || user.email.includes('@student.')) {
                    alert("Access Denied: This portal is for wardens only.");
                    signOut(auth).then(() => window.location.href = "warden-login.html");
                    return;
                }
                // Load applications when user is authenticated
                loadApplications();
                setupRealtimeListener();
            } else { window.location.href = "warden-login.html"; }
        });

        document.getElementById('logoutBtn').addEventListener('click', (e) => {
            e.preventDefault();
            signOut(auth).then(() => window.location.href = "index.html");
        });

        // Setup real-time listener for applications
        function setupRealtimeListener() {
            const q = query(collection(db, "applications"), where("applicationType", "==", "room"));
            
            onSnapshot(q, (snapshot) => {
                applications = [];
                snapshot.forEach((doc) => {
                    applications.push({
                        id: doc.id,
                        ...doc.data()
                    });
                });
                
                // Update stats
                updateStats();
                
                // Apply filters and render
                filterAndRenderApplications();
            }, (error) => {
                console.error("Error listening to applications:", error);
            });
        }

        // Load applications from Firestore
        async function loadApplications() {
            try {
                loadingSpinner.style.display = 'flex';
                
                const q = query(collection(db, "applications"), where("applicationType", "==", "room"));
                const querySnapshot = await getDocs(q);
                
                applications = [];
                querySnapshot.forEach((doc) => {
                    applications.push({
                        id: doc.id,
                        ...doc.data()
                    });
                });
                
                // Update stats
                updateStats();
                
                // Filter and render
                filterAndRenderApplications();
                
            } catch (error) {
                console.error("Error loading applications:", error);
                alert("Failed to load applications: " + error.message);
            } finally {
                loadingSpinner.style.display = 'none';
            }
        }

        // Update statistics
        function updateStats() {
            const pending = applications.filter(app => app.status === 'pending').length;
            const approved = applications.filter(app => app.status === 'approved').length;
            const rejected = applications.filter(app => app.status === 'rejected').length;
            
            pendingCount.textContent = pending;
            approvedCount.textContent = approved;
            rejectedCount.textContent = rejected;
        }

        // Filter and render applications
        function filterAndRenderApplications() {
            const searchTerm = searchInput.value.toLowerCase();
            const status = statusFilter.value;
            
            filteredApplications = applications.filter(app => {
                const matchesSearch = 
                    (app.fullName?.toLowerCase().includes(searchTerm) || false) ||
                    (app.studentId?.toLowerCase().includes(searchTerm) || false);
                
                const matchesStatus = status === 'all' || app.status === status;
                
                return matchesSearch && matchesStatus;
            });
            
            renderApplications();
        }

        // Render applications to table
        function renderApplications() {
            applicationsTableBody.innerHTML = '';
            
            if (filteredApplications.length === 0) {
                applicationsTable.style.display = 'none';
                emptyState.style.display = 'block';
                pagination.style.display = 'none';
                return;
            }
            
            applicationsTable.style.display = 'table';
            emptyState.style.display = 'none';
            pagination.style.display = 'flex';
            
            const start = (currentPage - 1) * itemsPerPage;
            const end = start + itemsPerPage;
            const pageItems = filteredApplications.slice(start, end);
            
            pageItems.forEach(app => {
                const row = document.createElement('tr');
                
                // Format date
                const appliedDate = app.submittedAt?.toDate ? 
                    app.submittedAt.toDate().toLocaleDateString('en-MY') : 
                    new Date().toLocaleDateString('en-MY');
                
                row.innerHTML = `
                    <td>
                        <div class="student-info">
                            <div class="student-avatar">${getInitials(app.fullName)}</div>
                            <div>
                                <div class="student-name">${app.fullName || 'N/A'}</div>
                                <div class="student-email">${app.email || 'N/A'}</div>
                            </div>
                        </div>
                    </td>
                    <td>${app.studentId || 'N/A'}</td>
                    <td><span class="room-badge">Not Assigned</span></td>
                    <td>${app.roomType || 'Not Specified'}</td>
                    <td>${appliedDate}</td>
                    <td><span class="status-badge status-${app.status || 'pending'}">${(app.status || 'pending').toUpperCase()}</span></td>
                    <td>
                        <div class="action-buttons">
                            <button class="action-btn action-view" onclick="viewApplication('${app.id}')"><i class="fas fa-eye"></i></button>
                            ${app.status === 'pending' ? `
                                <button class="action-btn action-approve" onclick="updateApplicationStatus('${app.id}', 'approved')"><i class="fas fa-check"></i></button>
                                <button class="action-btn action-reject" onclick="updateApplicationStatus('${app.id}', 'rejected')"><i class="fas fa-times"></i></button>
                            ` : ''}
                        </div>
                    </td>
                `;
                
                applicationsTableBody.appendChild(row);
            });
            
            renderPagination();
        }

        // Get initials from name
        function getInitials(name) {
            if (!name) return '?';
            return name.split(' ').map(n => n[0]).join('').toUpperCase().substring(0, 2);
        }

        // Render pagination
        function renderPagination() {
            const totalPages = Math.ceil(filteredApplications.length / itemsPerPage);
            const pageNumbers = document.getElementById('pageNumbers');
            
            let pagesHtml = '';
            for (let i = 1; i <= totalPages; i++) {
                pagesHtml += `<button class="page-btn ${i === currentPage ? 'active' : ''}" onclick="goToPage(${i})">${i}</button>`;
            }
            
            pageNumbers.innerHTML = pagesHtml;
        }

        // Global functions for button clicks
        window.viewApplication = (id) => {
            const app = applications.find(a => a.id === id);
            alert(`📋 Application Details:\n\n` +
                  `Name: ${app.fullName}\n` +
                  `Student ID: ${app.studentId}\n` +
                  `Email: ${app.email}\n` +
                  `Phone: ${app.phone}\n` +
                  `Course: ${app.course}\n` +
                  `IC Number: ${app.icNumber}\n` +
                  `Gender: ${app.gender}\n` +
                  `Race: ${app.race}\n` +
                  `Religion: ${app.religion}\n` +
                  `Address: ${app.address}\n` +
                  `Submitted: ${app.submittedAt?.toDate().toLocaleString() || 'N/A'}`);
        };

        window.updateApplicationStatus = async (id, status) => {
            if (confirm(`Are you sure you want to ${status} this application?`)) {
                try {
                    await updateDoc(doc(db, "applications", id), {
                        status: status,
                        reviewedAt: new Date()
                    });
                    alert(`Application ${status} successfully!`);
                } catch (error) {
                    alert("Error updating application: " + error.message);
                }
            }
        };

        window.goToPage = (page) => {
            currentPage = page;
            renderApplications();
        };

        // Search and filter
        searchInput.addEventListener('input', () => {
            currentPage = 1;
            filterAndRenderApplications();
        });

        statusFilter.addEventListener('change', () => {
            currentPage = 1;
            filterAndRenderApplications();
        });

        refreshBtn.addEventListener('click', () => {
            loadApplications();
        });

        // Pagination buttons
        document.getElementById('prevPage').addEventListener('click', () => {
            if (currentPage > 1) {
                currentPage--;
                renderApplications();
            }
        });

        document.getElementById('nextPage').addEventListener('click', () => {
            const totalPages = Math.ceil(filteredApplications.length / itemsPerPage);
            if (currentPage < totalPages) {
                currentPage++;
                renderApplications();
            }
        });
    </script>
</body>
</html>
