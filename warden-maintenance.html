    <style>

        /* Header Styling */
        header { background: linear-gradient(135deg, #1e3a8a 0%, #2d72d2 100%); backdrop-filter: blur(10px); color: white; padding: 0 25px; display: flex; align-items: center; justify-content: space-between; z-index: 1000; flex-shrink: 0; height: 70px; box-shadow: 0 2px 20px rgba(0,0,0,0.1); }

        
        
        
        

        
        
        
        
        
        
        
        .brand-container { 
            display: flex; 
            align-items: center; 
            font-size: 24px; 
            font-weight: 800; 
            cursor: pointer; 
            position: relative; 
            margin-left: 10px;
            letter-spacing: -0.5px;
        }
        
        
        
        
        .menu-toggle { cursor: pointer; font-size: 22px; color: white; margin-right: 15px; transition: transform 0.3s; }
        .menu-toggle:hover { transform: scale(1.1); }

        /* Avatar in Header */
                /* Premium Warden Avatar */
                /* Premium Warden Avatar */
        .avatar-container {
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            align-items: center;
            justify-content: center;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: linear-gradient(135deg, #ff3131 0%, #cc0000 100%);
            border: 2px solid rgba(255, 255, 255, 0.9);
            position: relative;
            overflow: hidden;
        }
        .avatar-container::after {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.4) 0%, transparent 60%);
        }
        .avatar-container:hover {
            transform: scale(1.1) translateY(-2px);
            border-color: #ffffff;
        }
        .avatar-container i {
            font-size: 22px;
            color: #ffffff;
            z-index: 2;
        }

        .container { display: flex; flex: 1; overflow: hidden; position: relative; }
        
        /* Sidebar */
        nav { width: 280px; background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); border-right: 1px solid rgba(255,255,255,0.2); padding: 25px 0; display: flex; flex-direction: column; transition: transform 0.3s ease; z-index: 900; overflow-y: auto; box-shadow: 5px 0 25px rgba(0,0,0,0.1); }

        .nav-menu { padding: 0 20px; flex: 1; }
        .nav-item { display: flex; align-items: center; padding: 14px 20px; margin-bottom: 8px; text-decoration: none; color: #333; border-radius: 12px; font-size: 15px; font-weight: 500; transition: all 0.3s; }
        .nav-item:hover { background: linear-gradient(135deg, #1e3a8a 0%, #2d72d2 100%); color: white; transform: translateX(5px); box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4); }
        .nav-item.active { background: linear-gradient(135deg, #1e3a8a 0%, #2d72d2 100%); color: white; box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4); }
        .nav-item i { margin-right: 12px; font-size: 20px; width: 24px; text-align: center; }
        
        .logout-btn { margin: 20px 20px 15px 20px; color: #f44336; border: 2px solid #f44336; background: transparent; }
        .logout-btn:hover { background: #f44336; color: white; border-color: #f44336; transform: translateX(5px); }
        
        main { flex: 1; padding: 30px; overflow-y: auto; background: #f0f3fa; }

        /* Loading Spinner */
        .loading-spinner {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 50px;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid rgba(102, 126, 234, 0.2);

            animation: spin 1s ease-in-out infinite;
        }

        @keyframes spin {

        /* Refresh Button */
        .refresh-btn {
            background: #2d72d2;

            border: none;
            border-radius: 8px;

            align-items: center;
            gap: 8px;

        }

<body>
    <header>
        <div style="display: flex; align-items: center;">

    <script type="module">
        import { getAuth, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, collection, query, orderBy, getDocs, doc, updateDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        import { auth, db } from "./js/firebase-config.js";

        const hamburger = document.getElementById('hamburger');
        const sidebar = document.getElementById('sidebar');
        const mainContent = document.getElementById('mainContent');
        const menuOverlay = document.getElementById('menuOverlay');

        let allRequests = [];
        let filteredRequests = [];
        let currentPage = 1;
        const itemsPerPage = 6;

        function closeSidebar() { sidebar.classList.remove('open'); menuOverlay.classList.remove('active'); }
        function openSidebar() { sidebar.classList.add('open'); menuOverlay.classList.add('active'); }

        hamburger.addEventListener('click', (e) => {
            e.preventDefault();
            sidebar.classList.contains('open') ? closeSidebar() : openSidebar();
        });

        menuOverlay.addEventListener('click', closeSidebar);
        mainContent.addEventListener('click', () => { if (window.innerWidth <= 768 && sidebar.classList.contains('open')) closeSidebar(); });
        window.addEventListener('resize', () => { if (window.innerWidth > 768) closeSidebar(); });

        onAuthStateChanged(auth, (user) => {
            if (user) {
                const email = user.email ? user.email.toLowerCase() : '';
                const isStudent = email.endsWith('@student.gmi.edu.my');
                
                if (isStudent) {
                    alert('🛡️ Access Denied: Student accounts cannot access Warden pages.');
                    window.location.href = 'student-dashboard.html';
                    return;
                }
                // RBAC PASS
            }
            if (user) {
                if (!user.email.endsWith('@gmi.edu.my') || user.email.includes('@student.')) {
                    alert("Access Denied: This portal is for wardens only.");
                    signOut(auth).then(() => window.location.href = "warden-login.html");
                    return;
                }
                loadMaintenanceRequests();
                setupRealtimeListener();
            } else { window.location.href = "warden-login.html"; }
        });

        document.getElementById('logoutBtn').addEventListener('click', (e) => {
            e.preventDefault();
            signOut(auth).then(() => window.location.href = "index.html");
        });

        // Setup real-time listener
        function setupRealtimeListener() {
            const q = query(collection(db, "maintenance_requests"), orderBy("submittedAt", "desc"));
            
            onSnapshot(q, (snapshot) => {
                allRequests = [];
                snapshot.forEach((doc) => {
                    allRequests.push({
                        id: doc.id,
                        ...doc.data()
                    });
                });
                updateStats();
                filterAndRenderRequests();
            }, (error) => {
                console.error("Error listening to requests:", error);
            });
        }
        
        window.filterChoices = {};
        document.addEventListener('DOMContentLoaded', function() {
            const selects = document.querySelectorAll('.filter-select');
            selects.forEach(select => {
                window.filterChoices[select.id] = new Choices(select, {
                    searchEnabled: false,
                    itemSelectText: '',
                    shouldSort: false
                });
            });
        });

        // Load maintenance requests
        async function loadMaintenanceRequests() {
            try {
                const q = query(collection(db, "maintenance_requests"), orderBy("submittedAt", "desc"));
                const querySnapshot = await getDocs(q);
                
                allRequests = [];
                querySnapshot.forEach((doc) => {
                    allRequests.push({
                        id: doc.id,
                        ...doc.data()
                    });
                });
                
                updateStats();
                filterAndRenderRequests();
            } catch (error) {
                console.error("Error loading maintenance requests:", error);
            }
        }

        // Update statistics
        function updateStats() {
            const pending = allRequests.filter(req => req.status === 'pending').length;
            const inProgress = allRequests.filter(req => req.status === 'in-progress').length;
            const completed = allRequests.filter(req => req.status === 'completed').length;
            const high = allRequests.filter(req => req.priority === 'high').length;
            const medium = allRequests.filter(req => req.priority === 'medium').length;
            const low = allRequests.filter(req => req.priority === 'low').length;
            
            document.getElementById('pendingCount').textContent = pending;
            document.getElementById('inProgressCount').textContent = inProgress;
            document.getElementById('completedCount').textContent = completed;
            document.getElementById('highCount').textContent = high;
            document.getElementById('mediumCount').textContent = medium;
            document.getElementById('lowCount').textContent = low;
        }

        // Filter and render requests
        function filterAndRenderRequests() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            const priorityFilter = document.getElementById('priorityFilter').value;
            const statusFilter = document.getElementById('statusFilter').value;
            
            filteredRequests = allRequests.filter(req => {
                // Search filter
                if (searchTerm) {
                    const matchesRoom = req.room?.toLowerCase().includes(searchTerm) || false;
                    const matchesTitle = req.category?.toLowerCase().includes(searchTerm) || false;
                    const matchesReporter = req.userEmail?.toLowerCase().includes(searchTerm) || false;
                    if (!matchesRoom && !matchesTitle && !matchesReporter) {
                        return false;
                    }
                }
                
                // Priority filter
                if (priorityFilter !== 'all' && req.priority !== priorityFilter) {
                    return false;
                }
                
                // Status filter
                if (statusFilter !== 'all' && req.status !== statusFilter) {
                    return false;
                }
                
                return true;
            });
            
            renderRequests();
        }

        // Render requests
        function renderRequests() {
            const grid = document.getElementById('maintenanceGrid');
            
            if (filteredRequests.length === 0) {
                grid.innerHTML = '<div class="empty-state"><i class="fas fa-tools"></i><h3>No Maintenance Requests</h3><p>There are no maintenance requests to display.</p></div>';
                return;
            }
            
            const start = (currentPage - 1) * itemsPerPage;
            const end = start + itemsPerPage;
            const pageItems = filteredRequests.slice(start, end);
            
            let html = '';
            pageItems.forEach(req => {
                const submittedDate = req.submittedAt?.toDate ? 
                    req.submittedAt.toDate().toLocaleString('en-MY', { day: 'numeric', month: 'short', hour: '2-digit', minute: '2-digit' }) : 
                    new Date().toLocaleString();
                
                const initials = req.userEmail ? req.userEmail.charAt(0).toUpperCase() : '?';
                const reporterName = req.userEmail ? req.userEmail.split('@')[0] : 'Student';
                
                html += `
                    <div class="maintenance-card ${req.priority || 'medium'}">
                        <div class="card-header">
                            <span class="room-badge">Room ${req.room || 'N/A'}</span>
                            <span class="priority-badge ${req.priority || 'medium'}">${(req.priority || 'medium').toUpperCase()} Priority</span>
                        </div>
                        <div class="issue-title">${req.category || 'General Issue'}</div>
                        <div class="issue-description">
                            ${req.description || 'No description provided'}
                        </div>
                        
                        <div class="reporter-info">
                            <div class="reporter-avatar">${initials}</div>
                            <div class="reporter-details">
                                <div class="reporter-name">${reporterName}</div>
                                <div class="reporter-meta">${req.userEmail || 'N/A'} • ${req.room || 'N/A'}</div>
                            </div>
                        </div>

                        <div class="time-info">
                            <i class="fas fa-clock"></i> Reported ${submittedDate}
                            ${req.preferredTime ? `<span style="margin-left: auto;"><i class="fas fa-calendar"></i> Preferred: ${new Date(req.preferredTime).toLocaleString()}</span>` : ''}
                        </div>

                        <div class="card-footer">
                            <span class="status-badge status-${req.status || 'pending'}">${(req.status || 'pending').replace('-', ' ').toUpperCase()}</span>
                            <div class="action-buttons">
                                <button class="action-btn action-view" onclick="viewRequest('${req.id}')"><i class="fas fa-eye"></i></button>
                                ${req.status === 'pending' ? `
                                    <button class="action-btn action-assign" onclick="updateRequestStatus('${req.id}', 'in-progress')"><i class="fas fa-user-plus"></i> Start</button>
                                ` : ''}
                                ${req.status === 'in-progress' ? `
                                    <button class="action-btn action-complete" onclick="updateRequestStatus('${req.id}', 'completed')"><i class="fas fa-check"></i> Complete</button>
                                ` : ''}
                            </div>
                        </div>
                    </div>
                `;
            });
            
            grid.innerHTML = html;
            renderPagination();
        }

        // Render pagination
        function renderPagination() {
            const totalPages = Math.ceil(filteredRequests.length / itemsPerPage);
            const pageNumbers = document.getElementById('pageNumbers');
            
            let pagesHtml = '';
            for (let i = 1; i <= totalPages; i++) {
                pagesHtml += `<button class="page-btn ${i === currentPage ? 'active' : ''}" onclick="goToPage(${i})">${i}</button>`;
            }
            
            pageNumbers.innerHTML = pagesHtml;
        }

        // Image compression helper
        async function compressImage(file, maxWidth = 800, maxHeight = 800) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = event => {
                    const img = new Image();
                    img.src = event.target.result;
                    img.onload = () => {
                        let width = img.width;
                        let height = img.height;
                        
                        if (width > height) {
                            if (width > maxWidth) {
                                height *= maxWidth / width;
                                width = maxWidth;
                            }
                        } else {
                            if (height > maxHeight) {
                                width *= maxHeight / height;
                                height = maxHeight;
                            }
                        }
                        
                        const canvas = document.createElement('canvas');
                        canvas.width = width;
                        canvas.height = height;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, width, height);
                        
                        const dataUrl = canvas.toDataURL('image/jpeg', 0.7);
                        resolve(dataUrl);
                    };
                    img.onerror = error => reject(error);
                };
                reader.onerror = error => reject(error);
            });
        }

        // Global functions
        window.viewRequest = (id) => {
            const req = allRequests.find(r => r.id === id);
            
            const htmlContent = `
                <div style="text-align: left; font-size: 14px; line-height: 1.6; padding: 10px;">
                    <h4 style="color: #2d72d2; border-bottom: 2px solid #e0e0e0; padding-bottom: 8px; margin-bottom: 15px;"><i class="fas fa-tools"></i> Issue Information</h4>
                    <p style="margin-bottom: 5px;"><strong>Category:</strong> ${req.category || 'N/A'}</p>
                    <p style="margin-bottom: 5px;"><strong>Description:</strong> ${req.description || 'N/A'}</p>
                    <p style="margin-bottom: 5px;"><strong>Room:</strong> ${req.room || 'N/A'}</p>
                    <p style="margin-bottom: 5px;"><strong>Priority:</strong> <span style="text-transform: uppercase; font-weight: bold; color: ${req.priority === 'high' ? '#f44336' : req.priority === 'medium' ? '#ff9800' : '#4caf50'};">${req.priority || 'N/A'}</span></p>
                    <p style="margin-bottom: 5px;"><strong>Status:</strong> <span style="text-transform: uppercase;">${(req.status || 'pending').replace('-', ' ')}</span></p>
                    
                    <h4 style="color: #2d72d2; border-bottom: 2px solid #e0e0e0; padding-bottom: 8px; margin-top: 25px; margin-bottom: 15px;"><i class="fas fa-clock"></i> Timeline & Reporter</h4>
                    <p style="margin-bottom: 5px;"><strong>Reported by:</strong> <a href="mailto:${req.userEmail}" style="color: #2d72d2;" title="Navigation Link">${req.userEmail || 'N/A'}</a></p>
                    <p style="margin-bottom: 5px;"><strong>Preferred Time:</strong> ${req.preferredTime ? new Date(req.preferredTime).toLocaleString() : 'Not specified'}</p>
                    <p style="margin-bottom: 5px;"><strong>Submitted:</strong> ${req.submittedAt?.toDate().toLocaleString() || 'N/A'}</p>
                    
                    ${req.photoData ? `<div style="margin-top:15px; border-top: 1px solid #e0e0e0; padding-top: 15px;"><p style="margin-bottom: 10px;"><strong><i class="fas fa-image"></i> Reported Damage Photo:</strong></p><img src="${req.photoData}" style="max-width: 100%; border-radius: 8px; border: 1px solid #ddd; cursor: pointer;" onclick="window.open(this.src, '_blank')" /></div>` : ''}
                    
                    ${req.completionPhotoData ? `<div style="margin-top:15px; border-top: 1px solid #e0e0e0; padding-top: 15px;"><p style="margin-bottom: 10px; color: #4caf50;"><strong><i class="fas fa-check-circle"></i> Completion Proof Photo:</strong></p><img src="${req.completionPhotoData}" style="max-width: 100%; border-radius: 8px; border: 1px solid #4caf50; cursor: pointer;" onclick="window.open(this.src, '_blank')" /></div>` : ''}
                </div>
            `;

            Swal.fire({ heightAuto: false,
                title: 'Maintenance Details',
                html: htmlContent,
                width: '500px',
                confirmButtonText: 'Close',
                confirmButtonColor: '#2d72d2',
                showClass: { popup: 'animate__animated animate__fadeInUp animate__faster' },
                hideClass: { popup: 'animate__animated animate__fadeOutDown animate__faster' }
            });
        };

        window.updateRequestStatus = async (id, status) => {
            const confirmColor = '#2d72d2';
            
            if (status === 'completed') {
                const { value: file } = await Swal.fire({
                    heightAuto: false,
                    title: 'Upload Proof',
                    text: 'Please snap a photo or upload an image as proof that the maintenance is completed.',
                    input: 'file',
                    inputAttributes: {
                        'accept': 'image/*',
                        'aria-label': 'Upload your completion photo'
                    },
                    showCancelButton: true,
                    confirmButtonColor: confirmColor,
                    confirmButtonText: '<i class="fas fa-check"></i> Complete Maintenance',
                    cancelButtonText: 'Cancel',
                    inputValidator: (value) => {
                        if (!value) {
                            return 'A photo is required to complete this request!';
                        }
                    }
                });

                if (file) {
                    try {
                        Swal.fire({
                            heightAuto: false,
                            title: 'Processing...',
                            html: 'Compressing photo and updating status...',
                            allowOutsideClick: false,
                            didOpen: () => {
                                Swal.showLoading();
                            }
                        });
                        
                        const photoData = await compressImage(file);
                        
                        await updateDoc(doc(db, "maintenance_requests", id), {
                            status: status,
                            updatedAt: new Date(),
                            completionPhotoData: photoData
                        });
                        
                        Swal.fire({ heightAuto: false,
                            title: 'Success!',
                            text: 'Request marked as completed successfully.',
                            icon: 'success',
                            confirmButtonColor: '#2d72d2'
                        });
                    } catch (error) {
                        Swal.fire({ heightAuto: false,
                            title: 'Error!',
                            text: "Error updating request: " + error.message,
                            icon: 'error',
                            confirmButtonColor: '#2d72d2'
                        });
                    }
                }
            } else {
                const result = await Swal.fire({ heightAuto: false,
                    title: 'Confirm Action',
                    text: `Are you sure you want to mark this request as ${status}?`,
                    icon: 'question',
                    showCancelButton: true,
                    confirmButtonColor: confirmColor,
                    cancelButtonColor: '#9e9e9e',
                    confirmButtonText: `Yes, Mark as ${status}`,
                    cancelButtonText: 'Cancel'
                });

                if (result.isConfirmed) {
                    try {
                        await updateDoc(doc(db, "maintenance_requests", id), {
                            status: status,
                            updatedAt: new Date()
                        });
                        Swal.fire({ heightAuto: false,
                            title: 'Success!',
                            text: `Request marked as ${status} successfully.`,
                            icon: 'success',
                            confirmButtonColor: '#2d72d2'
                        });
                    } catch (error) {
                        Swal.fire({ heightAuto: false,
                            title: 'Error!',
                            text: "Error updating request: " + error.message,
                            icon: 'error',
                            confirmButtonColor: '#2d72d2'
                        });
                    }
                }
            }
        };

        window.filterByPriority = (priority) => {
            if (window.filterChoices && window.filterChoices['priorityFilter']) {
                window.filterChoices['priorityFilter'].setChoiceByValue(priority);
            } else {
                document.getElementById('priorityFilter').value = priority;
            }
            currentPage = 1;
            filterAndRenderRequests();
            
            // Scroll to grid
            document.getElementById('maintenanceGrid').scrollIntoView({ behavior: 'smooth', block: 'start' });
        };

        window.filterByStatus = (status) => {
            if (window.filterChoices && window.filterChoices['statusFilter']) {
                window.filterChoices['statusFilter'].setChoiceByValue(status);
            } else {
                document.getElementById('statusFilter').value = status;
            }
            currentPage = 1;
            filterAndRenderRequests();
            
            // Scroll to grid
            document.getElementById('maintenanceGrid').scrollIntoView({ behavior: 'smooth', block: 'start' });
        };

        window.goToPage = (page) => {
            currentPage = page;
            renderRequests();
        };

        // Event listeners
        document.getElementById('searchInput').addEventListener('input', () => {
            currentPage = 1;
            filterAndRenderRequests();
        });

        document.getElementById('priorityFilter').addEventListener('change', () => {
            currentPage = 1;
            filterAndRenderRequests();
        });

        document.getElementById('statusFilter').addEventListener('change', () => {
            currentPage = 1;
            filterAndRenderRequests();
        });

        document.getElementById('refreshBtn').addEventListener('click', () => {
            loadMaintenanceRequests();
        });

        document.getElementById('prevPage').addEventListener('click', () => {
            if (currentPage > 1) {
                currentPage--;
                renderRequests();
            }
        });

        document.getElementById('nextPage').addEventListener('click', () => {
            const totalPages = Math.ceil(filteredRequests.length / itemsPerPage);
            if (currentPage < totalPages) {
                currentPage++;
                renderRequests();
            }
        });
    </script>
</body>
</html>
